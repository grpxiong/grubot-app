<!DOCTYPE html>
<html lang="es">
<head>
  <script src="config.js"></script>
  <script>
    window.grubot = {
      toast(msg) {
        const t = document.createElement('div');
        t.textContent = msg;
        t.style.cssText = [
          'position:fixed', 'bottom:24px', 'left:50%',
          'transform:translateX(-50%)',
          'background:#0f1f17', 'color:white',
          'padding:10px 18px', 'border-radius:999px',
          'font-size:13px', 'font-weight:600', 'z-index:9999'
        ].join(';');
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
      }
    };
  </script>
  <meta charset="UTF-8" />
  <title>Grubot — Partidos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#059669" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<div class="screen-wrap" id="partido-screen">

  <!-- ═══════════════════════════════════════
       VIEW 1: MATCH LIST
       ═══════════════════════════════════════ -->
  <div id="match-list-view">

    <div class="section-header fade-in">
      <div>
        <h2 class="section-title">Tus partidos</h2>
        <p class="section-sub" id="match-count-label">Cargando...</p>
      </div>
      <button class="btn-add" id="btn-new-match" title="Crear partido">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <div class="filter-row fade-in stagger-1" id="filter-row">
      <button class="filter-chip active" data-filter="upcoming">Próximos</button>
      <button class="filter-chip" data-filter="past">Anteriores</button>
      <button class="filter-chip" data-filter="all">Todos</button>
    </div>

    <div class="match-list" id="match-list"></div>

    <div class="empty-state" id="empty-matches" style="display:none;">
      <div class="empty-icon">🏟️</div>
      <h3>Sin partidos</h3>
      <p>Crea tu primera pichanga con el botón +</p>
    </div>

    <div id="match-skeletons" class="match-list">
      <div class="match-card-skeleton">
        <div class="skeleton" style="height:14px;width:70%;border-radius:4px"></div>
        <div style="display:flex;gap:12px;margin-top:10px;">
          <div class="skeleton" style="height:12px;width:40%;border-radius:4px"></div>
          <div class="skeleton" style="height:12px;width:30%;border-radius:4px"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <div class="skeleton" style="height:28px;width:60px;border-radius:999px"></div>
          <div class="skeleton" style="height:28px;width:50px;border-radius:999px"></div>
        </div>
      </div>
      <div class="match-card-skeleton">
        <div class="skeleton" style="height:14px;width:55%;border-radius:4px"></div>
        <div style="display:flex;gap:12px;margin-top:10px;">
          <div class="skeleton" style="height:12px;width:35%;border-radius:4px"></div>
          <div class="skeleton" style="height:12px;width:25%;border-radius:4px"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <div class="skeleton" style="height:28px;width:60px;border-radius:999px"></div>
          <div class="skeleton" style="height:28px;width:50px;border-radius:999px"></div>
        </div>
      </div>
      <div class="match-card-skeleton">
        <div class="skeleton" style="height:14px;width:70%;border-radius:4px"></div>
        <div style="display:flex;gap:12px;margin-top:10px;">
          <div class="skeleton" style="height:12px;width:40%;border-radius:4px"></div>
          <div class="skeleton" style="height:12px;width:30%;border-radius:4px"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <div class="skeleton" style="height:28px;width:60px;border-radius:999px"></div>
          <div class="skeleton" style="height:28px;width:50px;border-radius:999px"></div>
        </div>
      </div>
      <div class="match-card-skeleton">
        <div class="skeleton" style="height:14px;width:70%;border-radius:4px"></div>
        <div style="display:flex;gap:12px;margin-top:10px;">
          <div class="skeleton" style="height:12px;width:40%;border-radius:4px"></div>
          <div class="skeleton" style="height:12px;width:30%;border-radius:4px"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <div class="skeleton" style="height:28px;width:60px;border-radius:999px"></div>
          <div class="skeleton" style="height:28px;width:50px;border-radius:999px"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       VIEW 2: MATCH DETAIL
       ═══════════════════════════════════════ -->
  <div id="match-detail-view" style="display:none;">

    <button class="btn-back fade-in" id="btn-back-list">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/><path d="m12 19-7-7 7-7"/>
      </svg>
      <span>Partidos</span>
    </button>

    <div class="match-hero fade-in stagger-1" id="detail-hero">
      <div class="match-badge" id="detail-badge">⚡ Próximo partido</div>
      <div class="match-title" id="detail-title">—</div>
      <div class="match-details">
        <div class="match-detail-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span id="detail-date">—</span>
        </div>
        <div class="match-detail-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span id="detail-time">—</span>
        </div>
        <div class="match-detail-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="detail-location">—</span>
        </div>
        <div class="match-detail-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <span id="detail-price">—</span>
        </div>
      </div>
    </div>

    <!-- Estado & Cupos merged card -->
    <div class="card fade-in stagger-2">
      <div class="card-label">Estado &amp; Cupos</div>

      <div style="display:flex;align-items:center;gap:14px;">
        <!-- Traffic light -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:5px;background:var(--bg-input);border:1px solid var(--border);border-radius:20px;padding:8px 6px;flex-shrink:0;">
          <div id="tl-green" style="width:18px;height:18px;border-radius:50%;background:#059669;opacity:1;transition:opacity 0.2s;"></div>
          <div id="tl-amber" style="width:18px;height:18px;border-radius:50%;background:#f59e0b;opacity:0.18;transition:opacity 0.2s;"></div>
          <div id="tl-red"   style="width:18px;height:18px;border-radius:50%;background:#ef4444;opacity:0.18;transition:opacity 0.2s;"></div>
        </div>

        <!-- Status label + battery -->
        <div style="flex:1;display:flex;flex-direction:column;gap:10px;">
          <div>
            <div style="font-size:15px;font-weight:700;color:var(--text-main);" id="detail-status-name">Abierto</div>
            <div style="font-size:11px;color:var(--text-light);margin-top:2px;" id="detail-status-hint">El bot acepta inscripciones automáticamente.</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <span style="font-size:13px;font-weight:700;color:var(--text-main);" id="detail-battery-count">0 / 0 cupos</span>
              <span style="font-size:11px;color:var(--text-muted);" id="detail-battery-sub"></span>
            </div>
            <div style="display:flex;align-items:center;gap:5px;">
              <div style="flex:1;height:14px;background:var(--bg-input);border-radius:999px;overflow:hidden;border:1px solid var(--border);">
                <div id="detail-battery-fill" style="height:100%;border-radius:999px;background:#059669;transition:width 0.4s cubic-bezier(.16,1,.3,1);width:0%;"></div>
              </div>
              <div style="width:5px;height:8px;border-radius:0 3px 3px 0;background:var(--border);flex-shrink:0;"></div>
            </div>
            <div id="detail-seat-dots" style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;"></div>
          </div>
        </div>
      </div>

      <!-- Estado chips -->
      <div style="display:flex;gap:6px;margin-top:16px;">
        <button class="detail-estado-chip" data-estado="abierto">Abierto</button>
        <button class="detail-estado-chip" data-estado="cerrado">Cerrado</button>
        <button class="detail-estado-chip" data-estado="cancelado">Cancelado</button>
      </div>
    </div>

    <!-- Jugadores — full list -->
    <div class="card fade-in stagger-3">
      <div class="card-label">Jugadores inscritos</div>
      <div id="detail-player-list"></div>
    </div>

    <div class="fade-in stagger-4" style="margin-top:4px;display:flex;flex-direction:column;gap:8px;margin-bottom:24px;">
      <button class="btn-primary" id="btn-detail-share">
        📤&ensp;Enviar lista al grupo
      </button>
      <button class="btn-secondary" id="btn-detail-edit">
        ✏️&ensp;Editar partido
      </button>
    </div>
  </div>
</div>
  
<!-- ── Screen Logic ── -->
<script>
(function() {
  const toast = window.grubot?.toast ?? ((msg) => console.log('[toast]', msg));

  let allMatches    = [];
  let currentFilter = 'upcoming';

  const dias      = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const diasFull  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses     = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const mesesFull = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function fmtDateShort(iso) { const d=new Date(iso+'T12:00:00'); return dias[d.getDay()]+' '+d.getDate()+' '+meses[d.getMonth()]; }
  function fmtDateFull(iso)  { const d=new Date(iso+'T12:00:00'); return diasFull[d.getDay()]+' '+d.getDate()+' de '+mesesFull[d.getMonth()]+', '+d.getFullYear(); }
  function fmtTime(t)        { if(!t)return''; const[h,m]=t.split(':').map(Number); return((h%12)||12)+':'+String(m).padStart(2,'0')+' '+(h>=12?'PM':'AM'); }
  function fmtTimeRange(s,e) { return e?fmtTime(s)+' — '+fmtTime(e):fmtTime(s); }
  function isUpcoming(iso)   { const t=new Date();t.setHours(0,0,0,0);return new Date(iso+'T23:59:59')>=t; }
  function statusClass(e)    { return e==='abierto'?'open':e==='cancelado'?'cancelled':'closed'; }
  function statusLabel(e)    { return {abierto:'Abierto',cerrado:'Cerrado',cancelado:'Cancelado'}[e]||e; }

  const statusConfig = {
    abierto:   { name:'Abierto',   hint:'El bot acepta inscripciones automáticamente.', fill:'#059669', tl:'green', chipClass:'chip-open'      },
    cerrado:   { name:'Cerrado',   hint:'Solo el admin puede agregar jugadores.',        fill:'#f59e0b', tl:'amber', chipClass:'chip-cerrado'    },
    cancelado: { name:'Cancelado', hint:'Se notificará a los jugadores inscritos.',      fill:'#ef4444', tl:'red',   chipClass:'chip-cancelado'  },
  };

  function applyEstado(estado) {
    const cfg = statusConfig[estado] || statusConfig.abierto;
    document.getElementById('tl-green').style.opacity = cfg.tl==='green' ? '1' : '0.18';
    document.getElementById('tl-amber').style.opacity = cfg.tl==='amber' ? '1' : '0.18';
    document.getElementById('tl-red').style.opacity   = cfg.tl==='red'   ? '1' : '0.18';
    document.getElementById('detail-status-name').textContent       = cfg.name;
    document.getElementById('detail-status-hint').textContent       = cfg.hint;
    document.getElementById('detail-battery-fill').style.background = cfg.fill;
    document.querySelectorAll('.detail-estado-chip').forEach(c =>
      c.classList.remove('chip-open','chip-cerrado','chip-cancelado')
    );
    const active = document.querySelector(`.detail-estado-chip[data-estado="${estado}"]`);
    if (active) active.classList.add(cfg.chipClass);
  }

  function renderSeatDots(inscritos, cantidad, suplentes) {
    const wrap = document.getElementById('detail-seat-dots');
    let html = '';
    for (let i=0; i<cantidad; i++) {
      const s = i<inscritos
        ? 'background:#059669'
        : 'background:var(--bg-input);border:1px solid var(--border)';
      html += `<div style="width:10px;height:10px;border-radius:3px;${s};"></div>`;
    }
    for (let i=0; i<suplentes; i++) {
      html += `<div style="width:10px;height:10px;border-radius:3px;background:#f59e0b;"></div>`;
    }
    wrap.innerHTML = html;
  }

  // ── Render match list ──
  function renderList(matches) {
    const list  = document.getElementById('match-list');
    const empty = document.getElementById('empty-matches');
    document.getElementById('match-skeletons').style.display = 'none';

    let filtered = matches;
    if (currentFilter==='upcoming') filtered = matches.filter(m => isUpcoming(m.fecha_pichanga));
    if (currentFilter==='past')     filtered = matches.filter(m => !isUpcoming(m.fecha_pichanga));

    if (!filtered.length) {
      list.innerHTML = '';
      empty.style.display = 'block';
      document.getElementById('match-count-label').textContent = '0 partidos';
      return;
    }

    empty.style.display = 'none';
    document.getElementById('match-count-label').textContent = filtered.length+' partido'+(filtered.length!==1?'s':'');

    list.innerHTML = filtered.map((m,i) => {
      const pct    = m.cantidad ? Math.round((m.inscritos/m.cantidad)*100) : 0;
      const isPast = !isUpcoming(m.fecha_pichanga);
      return `
        <div class="match-card ${isPast?'past':''} ${m.estado==='cancelado'?'cancelled':''} fade-in"
             style="animation-delay:${Math.min(i*0.04,0.2)}s" data-id="${m.id}">
          <div class="mc-top">
            <div class="mc-title">${m.titulo}</div>
            <span class="mc-status ${statusClass(m.estado)}">${statusLabel(m.estado)}</span>
          </div>
          <div class="mc-info">
            <div class="mc-info-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              ${fmtDateShort(m.fecha_pichanga)}
            </div>
            <div class="mc-info-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
              ${fmtTime(m.hora_inicio)}
            </div>
            <div class="mc-info-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
              ${m.lugar}
            </div>
          </div>
          <div class="mc-footer">
            <div class="mc-players">
              <span>${m.inscritos}/${m.cantidad}</span>
              <div class="mc-players-bar"><div class="mc-players-fill" style="width:${pct}%"></div></div>
            </div>
            <div class="mc-arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </div>
          </div>
        </div>`;
    }).join('');

    list.querySelectorAll('.match-card').forEach(card => {
      card.addEventListener('click', () => {
        const match = allMatches.find(m => m.id === card.dataset.id);
        if (match) openDetail(match);
      });
    });
  }

  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentFilter = chip.dataset.filter;
      renderList(allMatches);
    });
  });

  // ── Open detail ──
  async function openDetail(m) {
    document.getElementById('match-list-view').style.display = 'none';
    const detail = document.getElementById('match-detail-view');
    detail.style.display = 'flex';
    document.getElementById('partido-screen').closest('.content')?.scrollTo(0, 0);
  
    const upcoming = isUpcoming(m.fecha_pichanga);
    document.getElementById('detail-badge').textContent    = upcoming ? '⚡ Próximo partido' : '📋 Partido finalizado';
    document.getElementById('detail-title').textContent    = m.titulo;
    document.getElementById('detail-date').textContent     = fmtDateFull(m.fecha_pichanga);
    document.getElementById('detail-time').textContent     = fmtTimeRange(m.hora_inicio, m.hora_fin);
    document.getElementById('detail-location').textContent = m.lugar;
    document.getElementById('detail-price').textContent    = 'S/ '+(m.cuota||0).toFixed(2)+' por persona ('+(m.metodo_pago||'Yape')+')';
  
    const inscritos = m.inscritos || 0;
    const cantidad  = m.cantidad  || 10;
    const suplentes = m.suplentes || 0;
    const pct       = Math.round((inscritos / cantidad) * 100);
  
    document.getElementById('detail-battery-count').textContent = inscritos+' / '+cantidad+' cupos';
    document.getElementById('detail-battery-sub').textContent   = suplentes > 0 ? '+'+suplentes+' suplente'+(suplentes>1?'s':'') : '';
    document.getElementById('detail-battery-fill').style.width  = pct+'%';
  
    renderSeatDots(inscritos, cantidad, suplentes);
    applyEstado(m.estado || 'abierto');
  
    detail.dataset.matchId = m.id;
  
    // Show loading state in player list while fetching
    const playerList = document.getElementById('detail-player-list');
    playerList.innerHTML = '<div style="text-align:center;padding:16px 0;font-size:13px;color:var(--text-light);">Cargando jugadores...</div>';
  
    // Fetch jugadores + personas in parallel
    const SUPABASE_URL = window.ENV?.SUPABASE_URL;
    const SUPABASE_KEY = window.ENV?.SUPABASE_KEY;
  
    try {
      // Step 1 — fetch jugadores_pichanga for this match
      const jugRes = await fetch(
        `${SUPABASE_URL}/rest/v1/jugadores_pichanga?id_pichanga=eq.${m.id}&order=fecha_registro.asc`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
      );
      if (!jugRes.ok) throw new Error(`jugadores HTTP ${jugRes.status}`);
      const jugadores = await jugRes.json();
  
      if (!jugadores.length) {
        playerList.innerHTML = '<div style="text-align:center;padding:16px 0;font-size:13px;color:var(--text-light);">Sin jugadores inscritos aún</div>';
        return;
      }
      // Step 2 — fetch personas by phone number
      const personaIds = [...new Set(jugadores.map(j => j.id_persona))];
      const personaRes = await fetch(
        `${SUPABASE_URL}/rest/v1/personas?numero=in.(${personaIds.join(',')})&select=numero,nombre`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
      );
      if (!personaRes.ok) throw new Error(`personas HTTP ${personaRes.status}`);
      const personas = await personaRes.json();
      
      // Step 3 — key map by numero (= id_persona in jugadores_pichanga)
      const personaMap = {};
      personas.forEach(p => { personaMap[p.numero] = p.nombre; });
      
      // Step 4 — split titulares / suplentes
      const tit = jugadores.filter(j => !j.suplente);
      const sup  = jugadores.filter(j =>  j.suplente);
      const emptySlots = Math.max(0, cantidad - tit.length);
      
      let html = '<div class="detail-player-section-label">Titulares</div>';
      
      html += tit.map((j, i) => {
        const nombre = personaMap[j.id_persona] || j.id_persona;
        const pagado = j.estado_pago === 'pagado';
        return `
          <div class="detail-player-row">
            <div class="dp-num tit">${i+1}</div>
            <div class="dp-name">${nombre}</div>
            <span class="dp-badge tit" style="${pagado
              ? 'background:#d1fae5;color:#065f46;'
              : 'background:#fef3c7;color:#92400e;'}">
              ${pagado ? 'Pagado' : 'Pendiente'}
            </span>
          </div>`;
      }).join('');
      
      // Empty slots
      for (let i = 0; i < emptySlots; i++) {
        html += `
          <div class="detail-player-row" style="opacity:0.4;">
            <div class="dp-num tit" style="background:var(--bg-input);color:var(--text-light);border:1px dashed var(--border);">${tit.length + i + 1}</div>
            <div class="dp-name" style="color:var(--text-light);font-style:italic;">Cupo disponible</div>
          </div>`;
      }
      
      if (sup.length) {
        html += '<div class="detail-player-section-label" style="margin-top:14px;">Suplentes</div>';
        html += sup.map((j, i) => {
          const nombre = personaMap[j.id_persona] || j.id_persona;
          const pagado = j.estado_pago === 'pagado';
          return `
            <div class="detail-player-row">
              <div class="dp-num sup">S${i+1}</div>
              <div class="dp-name">${nombre}</div>
              <span class="dp-badge sup" style="${pagado
                ? 'background:#d1fae5;color:#065f46;'
                : 'background:var(--warning-light);color:var(--warning);'}">
                ${pagado ? 'Pagado' : 'Pendiente'}
              </span>
            </div>`;
        }).join('');
      }
      
      playerList.innerHTML = html;
  
    } catch (err) {
      console.error('[Partido] Jugadores fetch error:', err);
      playerList.innerHTML = '<div style="text-align:center;padding:16px 0;font-size:13px;color:var(--error);">Error al cargar jugadores</div>';
    }
  }

  // ── Estado chip listeners ──
  document.querySelectorAll('.detail-estado-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const estado   = chip.dataset.estado;
      const SUPABASE_URL = window.ENV?.SUPABASE_URL;
      const SUPABASE_KEY = window.ENV?.SUPABASE_KEY;
      const id       = document.getElementById('match-detail-view').dataset.matchId;

      applyEstado(estado);
      toast('Estado: ' + (statusConfig[estado]?.name || estado));

      if (!SUPABASE_URL || !SUPABASE_KEY || !id) return;
      fetch(`${SUPABASE_URL}/rest/v1/pichangas?id_pichanga_pub=eq.${id}`, {
        method:  'PATCH',
        headers: {
          apikey:         SUPABASE_KEY,
          Authorization:  `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          Prefer:         'return=minimal'
        },
        body: JSON.stringify({ status: estado })
      }).catch(err => console.warn('[Partido] Estado update failed:', err.message));
    });
  });

  // ── Back button ──
  document.getElementById('btn-back-list').addEventListener('click', () => {
    document.getElementById('match-detail-view').style.display = 'none';
    document.getElementById('match-list-view').style.display   = 'block';
  });

  // ── Share button ──
  document.getElementById('btn-detail-share').addEventListener('click', function() {
    this.disabled    = true;
    this.textContent = 'Enviando...';
    setTimeout(() => {
      toast('Lista enviada al grupo ✓');
      this.disabled    = false;
      this.textContent = '📤  Enviar lista al grupo';
    }, 800);
  });

  // ── Edit button ──
  document.getElementById('btn-detail-edit').addEventListener('click', () => {
    const id = document.getElementById('match-detail-view').dataset.matchId;
    window.open('edit.html?id=' + id, '_blank');
  });

  // ── New match button ──
  document.getElementById('btn-new-match').addEventListener('click', () => {
    window.open('create.html', '_blank');
  });

  // ── Load matches from Supabase ──
  async function loadMatches() {
    const SUPABASE_URL = window.ENV?.SUPABASE_URL;
    const SUPABASE_KEY = window.ENV?.SUPABASE_KEY;

    if (!SUPABASE_URL || !SUPABASE_KEY || SUPABASE_URL.includes('your-project')) {
      console.warn('[Partido] Supabase not configured — check config.js');
      document.getElementById('match-skeletons').style.display = 'none';
      document.getElementById('empty-matches').style.display   = 'block';
      document.getElementById('match-count-label').textContent = 'Sin configuración';
      return;
    }

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/pichangas?order=fecha_pichanga.desc&limit=50`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
      );

      if (!res.ok) {
        const body = await res.json().catch(() => null);
        throw new Error(`HTTP ${res.status} — ${body?.message || body?.error || 'sin detalle'}`);
      }

      const rows = await res.json();
      console.log('[Partido] Loaded', rows.length, 'matches from Supabase');

      allMatches = rows.map(p => ({
        id:             p.id_pichanga_pub || p.id,
        titulo:         p.titulo,
        fecha_pichanga: p.fecha_pichanga,
        hora_inicio:    p.hora_inicio,
        hora_fin:       p.hora_fin,
        lugar:          p.lugar,
        cuota:          p.cuota,
        metodo_pago:    p.metodo_pago,
        cantidad:       p.cantidad,
        estado:         p.status || 'abierto',
        inscritos:      p.total_inscritos || 0,        // ← use real column
        suplentes:      Math.max(0, (p.total_inscritos || 0) - (p.cantidad || 0)), // ← derived
        jugadores:      [],
      }));

      renderList(allMatches);

    } catch (err) {
      console.error('[Partido] Load error:', err);
      document.getElementById('match-skeletons').style.display = 'none';
      document.getElementById('match-count-label').textContent = 'Error al cargar';
      document.getElementById('empty-matches').style.display   = 'block';
      document.getElementById('empty-matches').querySelector('p').textContent = err.message;
    }
  }

  loadMatches();
})();
</script>
</body>
</html>
