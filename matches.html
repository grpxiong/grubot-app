<!DOCTYPE html>
<html lang="es">

<head>
    <script src="config.js"></script>
    <script>
        window.grubot = {
            toast(msg) {
                const t = document.createElement('div');
                t.textContent = msg;
                t.style.cssText = [
                    'position:fixed', 'bottom:24px', 'left:50%',
                    'transform:translateX(-50%)',
                    'background:#0f1f17', 'color:white',
                    'padding:10px 18px', 'border-radius:999px',
                    'font-size:13px', 'font-weight:600', 'z-index:9999'
                ].join(';');
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 2000);
            }
        };
    </script>
    <meta charset="UTF-8" />
    <title>Grubot — Partidos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#059669" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="screen-wrap" id="partido-screen">

        <!-- ═══════════════════════════════════════
       VIEW 1: MATCH LIST
       ═══════════════════════════════════════ -->
        <div id="match-list-view">

            <div class="section-header fade-in">
                <div>
                    <h2 class="section-title">Tus <span>partidos</span></h2>
                    <p class="section-sub" id="match-count-label">Cargando...</p>
                </div>
                <button class="btn-add" id="btn-new-match" title="Crear partido">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                </button>
            </div>

            <div class="filter-row fade-in stagger-1" id="filter-row">
                <button class="filter-chip active" data-filter="upcoming">Próximos</button>
                <button class="filter-chip" data-filter="past">Anteriores</button>
                <button class="filter-chip" data-filter="all">Todos</button>
            </div>

            <div class="match-list" id="match-list"></div>

            <div class="empty-state" id="empty-matches" style="display:none;">
                <div class="empty-icon">🏟️</div>
                <h3>Sin partidos</h3>
                <p>Crea tu primera pichanga con el botón +</p>
            </div>

            <div id="match-skeletons" class="match-list">
                <div class="match-card-skeleton">
                    <div class="skeleton" style="height:14px;width:70%;border-radius:4px"></div>
                    <div style="display:flex;gap:12px;margin-top:10px;">
                        <div class="skeleton" style="height:12px;width:40%;border-radius:4px"></div>
                        <div class="skeleton" style="height:12px;width:30%;border-radius:4px"></div>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:12px;">
                        <div class="skeleton" style="height:28px;width:60px;border-radius:999px"></div>
                        <div class="skeleton" style="height:28px;width:50px;border-radius:999px"></div>
                    </div>
                </div>
                <div class="match-card-skeleton">
                    <div class="skeleton" style="height:14px;width:55%;border-radius:4px"></div>
                    <div style="display:flex;gap:12px;margin-top:10px;">
                        <div class="skeleton" style="height:12px;width:35%;border-radius:4px"></div>
                        <div class="skeleton" style="height:12px;width:25%;border-radius:4px"></div>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:12px;">
                        <div class="skeleton" style="height:28px;width:60px;border-radius:999px"></div>
                        <div class="skeleton" style="height:28px;width:50px;border-radius:999px"></div>
                    </div>
                </div>
                <div class="match-card-skeleton">
                    <div class="skeleton" style="height:14px;width:70%;border-radius:4px"></div>
                    <div style="display:flex;gap:12px;margin-top:10px;">
                        <div class="skeleton" style="height:12px;width:40%;border-radius:4px"></div>
                        <div class="skeleton" style="height:12px;width:30%;border-radius:4px"></div>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:12px;">
                        <div class="skeleton" style="height:28px;width:60px;border-radius:999px"></div>
                        <div class="skeleton" style="height:28px;width:50px;border-radius:999px"></div>
                    </div>
                </div>
                <div class="match-card-skeleton">
                    <div class="skeleton" style="height:14px;width:70%;border-radius:4px"></div>
                    <div style="display:flex;gap:12px;margin-top:10px;">
                        <div class="skeleton" style="height:12px;width:40%;border-radius:4px"></div>
                        <div class="skeleton" style="height:12px;width:30%;border-radius:4px"></div>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:12px;">
                        <div class="skeleton" style="height:28px;width:60px;border-radius:999px"></div>
                        <div class="skeleton" style="height:28px;width:50px;border-radius:999px"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══════════════════════════════════════
       VIEW 2: MATCH DETAIL
       ═══════════════════════════════════════ -->
        <div id="match-detail-view" style="display:none;">

            <div class="fade-in"
                style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
                <button class="btn-back" id="btn-back-list" style="margin-bottom:0;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M19 12H5" />
                        <path d="m12 19-7-7 7-7" />
                    </svg>
                    <span>Partidos</span>
                </button>
                <button class="btn-edit-float" id="btn-detail-edit" title="Editar partido">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 20h9" />
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                    </svg>
                </button>
            </div>

            <div class="match-hero fade-in stagger-1" id="detail-hero">
                <div class="match-title" id="detail-title">—</div>
                <div class="match-details">
                    <div class="match-detail-row">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="18" x="3" y="4" rx="2" />
                            <path d="M16 2v4M8 2v4M3 10h18" />
                        </svg>
                        <span id="detail-date">—</span>
                    </div>
                    <div class="match-detail-row">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 6v6l4 2" />
                        </svg>
                        <span id="detail-time">—</span>
                    </div>
                    <div class="match-detail-row">
                        <svg id="icon-location" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                            <circle cx="12" cy="10" r="3" />
                        </svg>
                        <span id="detail-location">—</span>
                    </div>
                    <div class="match-detail-row">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" x2="12" y1="2" y2="22" />
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                        </svg>
                        <span id="detail-price">—</span>
                    </div>
                </div>
            </div>

            <!-- Status badge + chips -->
            <div class="fade-in stagger-2"
                style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
                <span id="detail-status-badge"
                    style="display:inline-flex;align-items:center;padding:5px 12px;border-radius:999px;background:#d1fae5;color:#065f46;font-size:12px;font-weight:700;white-space:nowrap;">
                    Abierto · 0/0 confirmados
                </span>
                <div style="display:flex;gap:6px;">
                    <button class="detail-estado-chip" data-estado="abierto">Abierto</button>
                    <button class="detail-estado-chip" data-estado="cerrado">Cerrado</button>
                    <button class="detail-estado-chip" data-estado="cancelado">Cancelado</button>
                </div>
            </div>

            <!-- Jugadores — full list -->
            <div class="card fade-in stagger-3" id="detail-roster-card">
                <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
                    <div class="card-label" style="border-bottom:none;padding-bottom:0;">Jugadores</div>

                    <div id="detail-payment-summary"
                        style="font-size:12px;font-weight:700;color:var(--text-muted);white-space:nowrap;">
                        0/0 pagados
                    </div>
                </div>

                <div class="segmented" id="detail-roster-mode" style="margin-top:2px;">
                    <div>
                        <input type="radio" name="roster-mode" id="roster-mode-list" value="lista" checked />
                        <label class="btn-seg" for="roster-mode-list">Lista</label>
                    </div>
                    <div>
                        <input type="radio" name="roster-mode" id="roster-mode-pay" value="pagos" />
                        <label class="btn-seg" for="roster-mode-pay">Pagos</label>
                    </div>
                </div>

                <div id="detail-player-list"></div>
            </div>

            <div class="fade-in stagger-4"
                style="margin-top:4px;margin-bottom:24px;display:flex;flex-direction:column;gap:8px;">
                <a id="btn-join-whatsapp" href="#" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;
           background:#25D366;color:white;border:none;border-radius:var(--radius);
           height:50px;font-size:15px;font-weight:700;font-family:inherit;
           text-decoration:none;box-shadow:0 6px 16px -4px rgba(37,211,102,0.4);
           cursor:pointer;touch-action:manipulation;transition:opacity 0.15s;">
                    <svg viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px;">
                        <path
                            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
                        <path
                            d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.118 1.532 5.845L0 24l6.335-1.508A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.891 0-3.659-.5-5.188-1.373l-.372-.22-3.761.896.952-3.656-.242-.384A9.964 9.964 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z" />
                    </svg>
                    Anotarme al partido
                </a>
                <button class="btn-primary" id="btn-detail-share"
                    style="background:transparent;color:var(--text-muted);box-shadow:none;font-size:13px;height:40px;">
                    Retirarme del partido
                </button>
            </div>

        </div>
    </div>

    <!-- ── Screen Styles ── -->
    <style>
        .detail-estado-chip {
            padding: 5px 12px;
            border-radius: 999px;
            border: 1.5px solid var(--border);
            background: var(--bg-input);
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            touch-action: manipulation;
        }

        .detail-estado-chip.chip-open {
            background: #d1fae5;
            border-color: #059669;
            color: #065f46;
        }

        .detail-estado-chip.chip-cerrado {
            background: #fef3c7;
            border-color: #f59e0b;
            color: #92400e;
        }

        .detail-estado-chip.chip-cancelado {
            background: #fef2f2;
            border-color: #fecaca;
            color: #b91c1c;
        }
    </style>

    <!-- ── Screen Logic ── -->
    <script>
        (function () {
            const toast = window.grubot?.toast ?? ((msg) => console.log('[toast]', msg));

            let allMatches = [];
            let currentFilter = 'upcoming';
            let currentDetailPlayers = [];
            let detailRosterMode = 'lista';

            const dias = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            const diasFull = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            const meses = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
            const mesesFull = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];

            function fmtDateShort(iso) { const d = new Date(iso + 'T12:00:00'); return dias[d.getDay()] + ' ' + d.getDate() + ' ' + meses[d.getMonth()]; }
            function fmtDateFull(iso) { const d = new Date(iso + 'T12:00:00'); return diasFull[d.getDay()] + ' ' + d.getDate() + ' de ' + mesesFull[d.getMonth()] + ', ' + d.getFullYear(); }
            function fmtTime(t) { if (!t) return ''; const [h, m] = t.split(':').map(Number); return ((h % 12) || 12) + ':' + String(m).padStart(2, '0') + ' ' + (h >= 12 ? 'PM' : 'AM'); }
            function fmtTimeRange(s, e) { return e ? fmtTime(s) + ' — ' + fmtTime(e) : fmtTime(s); }
            function isUpcoming(iso) { const t = new Date(); t.setHours(0, 0, 0, 0); return new Date(iso + 'T23:59:59') >= t; }
            function statusClass(e) { return e === 'abierto' ? 'open' : e === 'cancelado' ? 'cancelled' : 'closed'; }
            function statusLabel(e) { return { abierto: 'Abierto', cerrado: 'Cerrado', cancelado: 'Cancelado' }[e] || e; }

            const statusConfig = {
                abierto: { name: 'Abierto', chipClass: 'chip-open' },
                cerrado: { name: 'Cerrado', chipClass: 'chip-cerrado' },
                cancelado: { name: 'Cancelado', chipClass: 'chip-cancelado' },
            };
            const badgeColors = {
                abierto: 'background:#d1fae5;color:#065f46;',
                cerrado: 'background:#fef3c7;color:#92400e;',
                cancelado: 'background:#fef2f2;color:#b91c1c;',
            };

            function applyEstado(estado, inscritos, cantidad) {
                const cfg = statusConfig[estado] || statusConfig.abierto;
                const badge = document.getElementById('detail-status-badge');
                if (badge) {
                    badge.setAttribute('style',
                        'display:inline-flex;align-items:center;padding:5px 12px;border-radius:999px;' +
                        'font-size:12px;font-weight:700;white-space:nowrap;' +
                        (badgeColors[estado] || badgeColors.abierto)
                    );
                    badge.textContent = cfg.name + ' · ' + inscritos + ' / ' + cantidad + ' anotados';
                }
                document.querySelectorAll('.detail-estado-chip').forEach(c =>
                    c.classList.remove('chip-open', 'chip-cerrado', 'chip-cancelado')
                );
                const active = document.querySelector(`.detail-estado-chip[data-estado="${estado}"]`);
                if (active) active.classList.add(cfg.chipClass);
            }

            function updateLocationIcon(locationText) {
                const icon = document.getElementById('icon-location');
                if (!icon) return;
                if (locationText.startsWith('http') || locationText.toLowerCase().includes('zoom')) {
                    icon.innerHTML = `<circle cx="12" cy="12" r="10"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                <path d="M2 12h20"/>`;
                } else {
                    icon.innerHTML = `<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
                <circle cx="12" cy="10" r="3"/>`;
                }
            }

            // ── Roster rendering ──────────────────────────────────────────

            function renderPlayerRow(player, num, isSup) {
                const numLabel = isSup ? `S${num}` : `${num}`;
                const numClass = isSup ? 'sup' : 'tit';

                if (detailRosterMode === 'lista') {
                    return `
              <div class="detail-player-row">
                <div class="dp-num ${numClass}">${numLabel}</div>
                <div class="dp-name">${player.nombre}</div>
              </div>`;
                }

                // Pagos mode
                const isPaid = player.pagado;
                return `
                    <div class="detail-player-row" data-persona="${player.id_persona}">
                    <div class="dp-num ${numClass}">${numLabel}</div>
                    <div class="dp-name">${player.nombre}</div>
                    <button
                        class="dp-pay-toggle ${isPaid ? 'is-paid' : 'is-unpaid'}"
                        data-persona="${player.id_persona}"
                        aria-label="${isPaid ? 'Marcar como no pagado' : 'Marcar como pagado'}"
                        type="button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"
                        style="width:12px;height:12px;">
                    <path d="M20 6 9 17l-5-5"/>
                    </svg>
                    </button>
                    </div>`;
            }

            function renderDetailPlayers() {
                const playerList = document.getElementById('detail-player-list');
                const summary = document.getElementById('detail-payment-summary');
                if (!playerList) return;

                const jugadores = currentDetailPlayers;
                const total = jugadores.length;
                const paidCount = jugadores.filter(j => j.pagado).length;

                if (summary) {
                    summary.textContent = `${paidCount}/${total} pagados`;
                    summary.style.display = detailRosterMode === 'pagos' ? 'inline-flex' : 'none';
                }

                if (!jugadores.length) {
                    playerList.innerHTML = '<div style="text-align:center;padding:16px 0;font-size:13px;color:var(--text-light);">Sin jugadores inscritos aún</div>';
                    return;
                }

                const tit = jugadores.filter(j => !j.suplente);
                const sup = jugadores.filter(j => j.suplente);
                let html = '';

                if (tit.length) {
                    html += tit.map((j, i) => renderPlayerRow(j, i + 1, false)).join('');
                }
                if (sup.length) {
                    html += '<div class="detail-player-section-label" style="margin-top:14px;">Suplentes</div>';
                    html += sup.map((j, i) => renderPlayerRow(j, i + 1, true)).join('');
                }

                playerList.innerHTML = html;

                if (detailRosterMode === 'pagos') {
                    bindPaymentControls();
                }
            }

            function bindPaymentControls() {
                document.querySelectorAll('.dp-pay-toggle').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const personaId = btn.dataset.persona;
                        const player = currentDetailPlayers.find(p => String(p.id_persona) === String(personaId));
                        if (!player) return;

                        const nextPaid = !player.pagado;
                        player.pagado = nextPaid;
                        renderDetailPlayers();
                        toast(nextPaid ? 'Pago marcado ✓' : 'Pago desmarcado');

                        const matchId = document.getElementById('match-detail-view')?.dataset.matchId;
                        const SUPABASE_URL = window.ENV?.SUPABASE_URL;
                        const SUPABASE_KEY = window.ENV?.SUPABASE_KEY;
                        if (!SUPABASE_URL || !SUPABASE_KEY || !matchId) return;

                        try {
                            const res = await fetch(
                                `${SUPABASE_URL}/rest/v1/jugadores_pichanga?id_pichanga=eq.${matchId}&id_persona=eq.${personaId}`,
                                {
                                    method: 'PATCH',
                                    headers: {
                                        apikey: SUPABASE_KEY,
                                        Authorization: `Bearer ${SUPABASE_KEY}`,
                                        'Content-Type': 'application/json',
                                        Prefer: 'return=minimal'
                                    },
                                    body: JSON.stringify({ estado_pago: nextPaid ? 'pagado' : 'pendiente' })
                                }
                            );
                            if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        } catch (err) {
                            player.pagado = !nextPaid;
                            renderDetailPlayers();
                            toast('Error al actualizar pago');
                            console.warn('[Partido] Pago update failed:', err.message);
                        }
                    });
                });
            }

            // ── Roster mode toggle ────────────────────────────────────────

            document.querySelectorAll('input[name="roster-mode"]').forEach(radio => {
                radio.addEventListener('change', () => {
                    detailRosterMode = radio.value;
                    renderDetailPlayers();
                });
            });

            // ── Match list rendering ──────────────────────────────────────

            function renderList(matches) {
                const list = document.getElementById('match-list');
                const empty = document.getElementById('empty-matches');
                document.getElementById('match-skeletons').style.display = 'none';

                let filtered = matches;
                if (currentFilter === 'upcoming') filtered = matches.filter(m => isUpcoming(m.fecha_pichanga));
                if (currentFilter === 'past') filtered = matches.filter(m => !isUpcoming(m.fecha_pichanga));

                if (!filtered.length) {
                    list.innerHTML = '';
                    empty.style.display = 'block';
                    document.getElementById('match-count-label').textContent = '0 partidos';
                    return;
                }

                empty.style.display = 'none';
                document.getElementById('match-count-label').textContent = filtered.length + ' partido' + (filtered.length !== 1 ? 's' : '');

                list.innerHTML = filtered.map((m, i) => {
                    const pct = m.cantidad ? Math.round((m.inscritos / m.cantidad) * 100) : 0;
                    const isPast = !isUpcoming(m.fecha_pichanga);
                    const lugarDisplay = m.nombre_cancha
                        ? m.nombre_cancha + (m.distrito ? ' — ' + m.distrito.toUpperCase() : '')
                        : (m.lugar || 'Lugar no especificado');
                    return `
              <div class="match-card ${isPast ? 'past' : ''} ${m.estado === 'cancelado' ? 'cancelled' : ''} fade-in"
                   style="animation-delay:${Math.min(i * 0.04, 0.2)}s" data-id="${m.id}">
                <div class="mc-top">
                  <div class="mc-title">${m.titulo}</div>
                  <span class="mc-status ${statusClass(m.estado)}">${statusLabel(m.estado)}</span>
                </div>
                <div class="mc-info">
                  <div class="mc-info-top">
                    <div class="mc-info-item">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                      ${fmtDateShort(m.fecha_pichanga)}
                    </div>
                    <div class="mc-info-item">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                      ${fmtTime(m.hora_inicio)}
                    </div>
                  </div>
                  <div class="mc-info-item location">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                    ${lugarDisplay}
                  </div>
                </div>
                <div class="mc-footer">
                  <div class="mc-players">
                    <div class="mc-players-bar"><div class="mc-players-fill" style="width:${pct}%"></div></div>
                    <span>${m.inscritos}/${m.cantidad} inscritos</span>
                  </div>
                  <div class="mc-arrow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                  </div>
                </div>
              </div>`;
                }).join('');

                list.querySelectorAll('.match-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const match = allMatches.find(m => m.id === card.dataset.id);
                        if (match) openDetail(match);
                    });
                });
            }

            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    currentFilter = chip.dataset.filter;
                    loadMatches();
                });
            });

            // ── Open detail ───────────────────────────────────────────────

            async function openDetail(m) {
                // Reset roster state for new match
                currentDetailPlayers = [];
                detailRosterMode = 'lista';
                const listRadio = document.getElementById('roster-mode-list');
                if (listRadio) listRadio.checked = true;

                document.getElementById('match-list-view').style.display = 'none';
                const detail = document.getElementById('match-detail-view');
                detail.style.display = 'flex';
                detail.style.flexDirection = 'column';
                detail.style.gap = '12px';
                detail.style.width = '100%';
                document.getElementById('partido-screen').closest('.content')?.scrollTo(0, 0);

                document.getElementById('detail-title').textContent = m.titulo;
                document.getElementById('detail-date').textContent = fmtDateFull(m.fecha_pichanga);
                document.getElementById('detail-time').textContent = fmtTimeRange(m.hora_inicio, m.hora_fin);

                const lugarText = m.nombre_cancha
                    ? m.nombre_cancha + (m.direccion ? ' (' + m.direccion + ')' : '')
                    : (m.lugar || 'Lugar no especificado');
                document.getElementById('detail-location').textContent = lugarText;
                updateLocationIcon(lugarText);

                document.getElementById('detail-price').textContent = m.cuota > 0
                    ? `S/ ${m.cuota.toFixed(2)} por persona — ${m.metodo_pago || 'Yape'} al ${m.numero_pago || 'no especificado'}`
                    : 'Ingreso libre';

                const inscritos = m.inscritos || 0;
                const cantidad = m.cantidad || 10;
                detail.dataset.matchId = m.id;
                detail.dataset.inscritos = inscritos;
                detail.dataset.cantidad = cantidad;

                const waLink = document.getElementById('btn-join-whatsapp');
                if (waLink) waLink.href = `https://wa.me/51926066602?text=${encodeURIComponent('/anotarme ' + m.id)}`;

                applyEstado(m.estado || 'abierto', inscritos, cantidad);

                // Show loading state
                const playerList = document.getElementById('detail-player-list');
                const summary = document.getElementById('detail-payment-summary');
                playerList.innerHTML = '<div style="text-align:center;padding:16px 0;font-size:13px;color:var(--text-light);">Cargando jugadores...</div>';
                if (summary) summary.style.display = 'none';

                const SUPABASE_URL = window.ENV?.SUPABASE_URL;
                const SUPABASE_KEY = window.ENV?.SUPABASE_KEY;

                try {
                    const jugRes = await fetch(
                        `${SUPABASE_URL}/rest/v1/jugadores_pichanga?id_pichanga=eq.${m.id}&estado_participacion=eq.anotado&order=fecha_registro.asc&select=id_persona,nombre,suplente,estado_pago`,
                        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
                    );
                    if (!jugRes.ok) throw new Error(`jugadores HTTP ${jugRes.status}`);
                    const raw = await jugRes.json();

                    // Normalise — store pagado as boolean from estado_pago field
                    currentDetailPlayers = raw.map(j => ({
                        id_persona: j.id_persona,
                        nombre: j.nombre || j.id_persona,
                        suplente: j.suplente,
                        pagado: j.estado_pago === 'pagado',
                    }));

                    renderDetailPlayers();

                } catch (err) {
                    console.error('[Partido] Jugadores fetch error:', err);
                    playerList.innerHTML = '<div style="text-align:center;padding:16px 0;font-size:13px;color:var(--error);">Error al cargar jugadores</div>';
                }
            }

            // ── Estado chip listeners ─────────────────────────────────────

            document.querySelectorAll('.detail-estado-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const estado = chip.dataset.estado;
                    const detailEl = document.getElementById('match-detail-view');
                    const id = detailEl.dataset.matchId;
                    const inscritos = detailEl.dataset.inscritos || 0;
                    const cantidad = detailEl.dataset.cantidad || 0;
                    const SUPABASE_URL = window.ENV?.SUPABASE_URL;
                    const SUPABASE_KEY = window.ENV?.SUPABASE_KEY;

                    applyEstado(estado, inscritos, cantidad);
                    toast('Estado: ' + (statusConfig[estado]?.name || estado));

                    if (!SUPABASE_URL || !SUPABASE_KEY || !id) return;
                    fetch(`${SUPABASE_URL}/rest/v1/pichangas?id_pichanga_pub=eq.${id}`, {
                        method: 'PATCH',
                        headers: {
                            apikey: SUPABASE_KEY,
                            Authorization: `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json',
                            Prefer: 'return=minimal'
                        },
                        body: JSON.stringify({ status: estado })
                    }).catch(err => console.warn('[Partido] Estado update failed:', err.message));
                });
            });

            // ── Back button ───────────────────────────────────────────────

            document.getElementById('btn-back-list').addEventListener('click', () => {
                currentDetailPlayers = [];
                detailRosterMode = 'lista';
                const listRadio = document.getElementById('roster-mode-list');
                if (listRadio) listRadio.checked = true;

                const detail = document.getElementById('match-detail-view');
                detail.style.display = 'none';
                detail.style.flexDirection = '';
                detail.style.gap = '';
                detail.style.width = '';
                document.getElementById('match-list-view').style.display = 'block';
                loadMatches();
            });

            // ── Other buttons ─────────────────────────────────────────────

            document.getElementById('btn-detail-share').addEventListener('click', () => {
                const id = document.getElementById('match-detail-view').dataset.matchId;
                window.open(`https://wa.me/51926066602?text=${encodeURIComponent('/retirarme ' + id)}`, '_blank');
            });

            document.getElementById('btn-detail-edit').addEventListener('click', () => {
                const id = document.getElementById('match-detail-view').dataset.matchId;
                window.open('edit.html?id=' + id, '_blank');
            });

            document.getElementById('btn-new-match').addEventListener('click', () => {
                window.open('create.html', '_blank');
            });

            // ── Load matches ──────────────────────────────────────────────

            async function loadMatches() {
                const SUPABASE_URL = window.ENV?.SUPABASE_URL;
                const SUPABASE_KEY = window.ENV?.SUPABASE_KEY;

                document.getElementById('match-skeletons').style.display = 'block';
                document.getElementById('match-list').innerHTML = '';
                document.getElementById('empty-matches').style.display = 'none';
                document.getElementById('match-count-label').textContent = 'Cargando...';

                if (!SUPABASE_URL || !SUPABASE_KEY || SUPABASE_URL.includes('your-project')) {
                    console.warn('[Partido] Supabase not configured — check config.js');
                    document.getElementById('match-skeletons').style.display = 'none';
                    document.getElementById('empty-matches').style.display = 'block';
                    document.getElementById('match-count-label').textContent = 'Sin configuración';
                    return;
                }

                try {
                    const res = await fetch(
                        `${SUPABASE_URL}/rest/v1/pichangas?order=fecha_pichanga.desc&limit=50`,
                        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
                    );
                    if (!res.ok) {
                        const body = await res.json().catch(() => null);
                        throw new Error(`HTTP ${res.status} — ${body?.message || body?.error || 'sin detalle'}`);
                    }

                    const rows = await res.json();
                    console.log('[Partido] Loaded', rows.length, 'matches from Supabase');

                    allMatches = rows.map(p => ({
                        id: p.id_pichanga_pub || p.id,
                        titulo: p.titulo,
                        fecha_pichanga: p.fecha_pichanga,
                        hora_inicio: p.hora_inicio,
                        hora_fin: p.hora_fin,
                        lugar: p.lugar || 'Lugar no especificado',
                        nombre_cancha: p.nombre_cancha || '',
                        direccion: p.direccion || '',
                        ciudad: p.ciudad || '',
                        distrito: p.distrito || '',
                        cuota: p.cuota,
                        metodo_pago: p.metodo_pago,
                        numero_pago: p.numero_pago,
                        cantidad: p.cantidad,
                        estado: p.status || 'abierto',
                        inscritos: p.total_inscritos || 0,
                        suplentes: Math.max(0, (p.total_inscritos || 0) - (p.cantidad || 0)),
                    }));

                    renderList(allMatches);

                    const urlId = new URLSearchParams(window.location.search).get('id');
                    if (urlId) {
                        const match = allMatches.find(m => m.id === urlId);
                        if (match) {
                            openDetail(match);
                            window.history.replaceState({}, '', window.location.pathname);
                        }
                    }

                } catch (err) {
                    console.error('[Partido] Load error:', err);
                    document.getElementById('match-skeletons').style.display = 'none';
                    document.getElementById('match-count-label').textContent = 'Error al cargar';
                    document.getElementById('empty-matches').style.display = 'block';
                    document.getElementById('empty-matches').querySelector('p').textContent = err.message;
                }
            }

            loadMatches();
        })();
    </script>
</body>

</html>
