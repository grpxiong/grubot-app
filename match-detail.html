<!DOCTYPE html>
<html lang="es">
<head>
  <script src="config.js"></script>
  <meta charset="UTF-8" />
  <title>Grubot — Partido</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#059669" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Match detail layout ── */
    .detail-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 32px;
    }

    /* ── Status badge ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status-badge.abierto   { background:#d1fae5; color:#065f46; }
    .status-badge.cerrado   { background:#fef3c7; color:#92400e; }
    .status-badge.cancelado { background:#fef2f2; color:#b91c1c; }

    /* ── Action buttons ── */
    .btn-whatsapp {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #25D366; color: white; border: none; border-radius: var(--radius);
      height: 50px; font-size: 15px; font-weight: 700; font-family: inherit;
      text-decoration: none; box-shadow: 0 6px 16px -4px rgba(37,211,102,0.4);
      cursor: pointer; touch-action: manipulation; transition: opacity 0.15s;
    }
    .btn-whatsapp:active { opacity: 0.85; }

    .btn-retirar {
      width: 100%; background: transparent; color: var(--text-muted);
      box-shadow: none; border: 0px;
      border-radius: var(--radius); height: 40px; font-size: 13px;
      font-weight: 700; font-family: inherit; cursor: pointer;
      touch-action: manipulation; transition: all 0.15s;
    }
    .btn-retirar:active { border-color: var(--error); color: var(--error); }

    /* ── Loading / error states ── */
    .state-msg {
      text-align: center;
      padding: 48px 20px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .state-msg h3 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
      color: var(--text-main);
    }

    /* ── Skeleton ── */
    .skeleton-hero {
      height: 160px;
      background: linear-gradient(90deg, var(--border) 25%, #e8f5e9 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius-xl);
    }
    .skeleton-line {
      height: 14px;
      background: linear-gradient(90deg, var(--border) 25%, #e8f5e9 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>

<body>
<div class="screen-wrap" id="detail-screen">

  <!-- Loading skeleton -->
  <div id="skeleton-view" class="detail-wrap">
    <div class="skeleton-hero"></div>
    <div class="skeleton-line" style="width:60%;"></div>
    <div class="skeleton-line" style="width:40%;"></div>
    <div class="card">
      <div class="skeleton-line" style="width:30%;height:10px;"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line" style="width:70%;"></div>
    </div>
  </div>

  <!-- Error state -->
  <div id="error-view" style="display:none;" class="state-msg">
    <h3>⚠ No encontrado</h3>
    <p id="error-msg">No pudimos cargar este partido.</p>
  </div>

  <!-- Main content -->
  <div id="main-view" style="display:none;" class="detail-wrap fade-in">

    <!-- Hero -->
    <div class="match-hero">
      <div class="match-title" id="detail-title">—</div>
      <div class="match-details">
        <div class="match-detail-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          <span id="detail-date">—</span>
        </div>
        <div class="match-detail-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
          </svg>
          <span id="detail-time">—</span>
        </div>
        <div class="match-detail-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          <span id="detail-location">—</span>
        </div>
        <div class="match-detail-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          <span id="detail-price">—</span>
        </div>
      </div>
    </div>

    <!-- Status badge -->
    <div>
      <span id="detail-status-badge" class="status-badge abierto">Abierto · 0/0 anotados</span>
    </div>

    <!-- Player list -->
    <div class="card">
      <div class="card-label">Jugadores</div>
      <div id="detail-player-list">
        <div class="state-msg" style="padding:16px 0;">Cargando jugadores...</div>
      </div>
    </div>

    <!-- Actions -->
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px;">
      <a id="btn-join-whatsapp" href="#" target="_blank" class="btn-whatsapp">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px;">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.118 1.532 5.845L0 24l6.335-1.508A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.891 0-3.659-.5-5.188-1.373l-.372-.22-3.761.896.952-3.656-.242-.384A9.964 9.964 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
        </svg>
        Anotarme al partido
      </a>
      <button class="btn-retirar" id="btn-retirar">
        Retirarme del partido
      </button>
    </div>

  </div>
</div>

<script>
(function () {
  const dias     = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses    = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function fmtDateFull(iso) {
    const d = new Date(iso + 'T12:00:00');
    return dias[d.getDay()] + ' ' + d.getDate() + ' de ' + meses[d.getMonth()] + ', ' + d.getFullYear();
  }
  function fmtTime(t) {
    if (!t) return '';
    const [h, m] = t.split(':').map(Number);
    return ((h % 12) || 12) + ':' + String(m).padStart(2, '0') + ' ' + (h >= 12 ? 'PM' : 'AM');
  }
  function fmtTimeRange(s, e) {
    return e ? fmtTime(s) + ' — ' + fmtTime(e) : fmtTime(s);
  }

  function showError(msg) {
    document.getElementById('skeleton-view').style.display = 'none';
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error-view').style.display = 'block';
  }

  async function load() {
    const SUPABASE_URL = window.ENV?.SUPABASE_URL;
    const SUPABASE_KEY = window.ENV?.SUPABASE_KEY;

    const params  = new URLSearchParams(window.location.search);
    const matchId = params.get('id');

    if (!matchId) {
      showError('Verificar el link del partido. ID no encontrado.');
      return;
    }

    if (!SUPABASE_URL || !SUPABASE_KEY) {
      showError('Configuración de Supabase no encontrada.');
      return;
    }

    try {
      // Fetch pichanga
      const res  = await fetch(
        `${SUPABASE_URL}/rest/v1/pichangas?id_pichanga_pub=eq.${matchId}`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const p    = data[0];
      if (!p) throw new Error('Partido no encontrado.');

      // Populate hero
      const lugar     = p.nombre_cancha + ' (' + p.direccion + ')' || 'Lugar no especificado';
      const inscritos = p.total_inscritos || 0;
      const cantidad  = p.cantidad || 0;
      const estado    = p.status || 'abierto';

      document.getElementById('detail-title').textContent    = p.titulo || '—';
      document.getElementById('detail-date').textContent     = fmtDateFull(p.fecha_pichanga);
      document.getElementById('detail-time').textContent     = fmtTimeRange(p.hora_inicio, p.hora_fin);
      document.getElementById('detail-location').textContent = lugar;
      document.getElementById('detail-price').textContent = p.cuota > 0
          ? `S/ ${(p.cuota).toFixed(2)} por persona - ${p.metodo_pago || 'Yape'} al ${p.numero_pago || 'no especificado'}`
          : 'Ingreso libre';

      // Status badge
      const badge = document.getElementById('detail-status-badge');
      const estadoLabels = { abierto: 'Abierto', cerrado: 'Cerrado', cancelado: 'Cancelado' };
      badge.textContent = (estadoLabels[estado] || estado) + ' · ' + inscritos + '/' + cantidad + ' anotados';
      badge.className   = 'status-badge ' + estado;

      // WhatsApp links
      const waJoin   = document.getElementById('btn-join-whatsapp');
      const waRetire = document.getElementById('btn-retirar');
      waJoin.href = `https://wa.me/51926066602?text=${encodeURIComponent('/anotarme ' + matchId)}`;
      waRetire.addEventListener('click', () => {
        window.open(`https://wa.me/51926066602?text=${encodeURIComponent('/retirarme ' + matchId)}`, '_blank');
      });

      // Fetch jugadores
      const jugRes = await fetch(
        `${SUPABASE_URL}/rest/v1/jugadores_pichanga?id_pichanga=eq.${matchId}&estado_participacion=eq.anotado&order=fecha_registro.asc&select=nombre,suplente,id_persona`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
      );
      if (!jugRes.ok) throw new Error(`jugadores HTTP ${jugRes.status}`);
      const jugadores = await jugRes.json();

      const playerList = document.getElementById('detail-player-list');

      if (!jugadores.length) {
        playerList.innerHTML = '<div style="text-align:center;padding:16px 0;font-size:13px;color:var(--text-light);">Sin jugadores inscritos aún</div>';
      } else {
        const tit = jugadores.filter(j => !j.suplente);
        const sup = jugadores.filter(j =>  j.suplente);
        let html  = '';

        html += tit.map((j, i) => `
          <div class="detail-player-row">
            <div class="dp-num tit">${i + 1}</div>
            <div class="dp-name">${j.nombre || j.id_persona}</div>
          </div>`).join('');

        if (sup.length) {
          html += '<div class="detail-player-section-label" style="margin-top:14px;">Suplentes</div>';
          html += sup.map((j, i) => `
            <div class="detail-player-row">
              <div class="dp-num sup">S${i + 1}</div>
              <div class="dp-name">${j.nombre || j.id_persona}</div>
            </div>`).join('');
        }

        playerList.innerHTML = html;
      }

      // Show main content
      document.getElementById('skeleton-view').style.display = 'none';
      document.getElementById('main-view').style.display     = 'flex';

    } catch (err) {
      console.error('[match-detail]', err);
      showError(err.message);
    }
  }

  load();
})();
</script>
</body>
</html>
