<script>
    const SUPABASE_URL = 'https://fzrpjbojyzzohcypgfzm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_6WvoLA-b4diZ4_omsc-XUg_5iNrppdz';
    const N8N_WEBHOOK_URL = 'TU_URL_DE_N8N_AQUI'; // <--- PEGA TU URL DE N8N AQUÍ

    const urlParams = new URLSearchParams(window.location.search);
    const numero = (urlParams.get('numero') || '').replace(/\s/g, '+') || null;
    const matchId = urlParams.get('match_id') || null; // <--- CAPTURAMOS EL ID DE LA PICHANGA

    // ... (lógica de selects y pasos igual) ...

    document.getElementById('btn-submit').onclick = async () => {
      // ... (validaciones de fecha igual) ...

      try {
        const nombreCompleto = `${document.getElementById('input-nombre').value.trim()} ${document.getElementById('input-apellido').value.trim()}`;
        
        // A. GUARDAR EN SUPABASE
        const res = await fetch(`${SUPABASE_URL}/rest/v1/personas`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            nombre: nombreCompleto,
            fecha_nac: `${y}-${m}-${d}`,
            numero: numero
          })
        });

        if (!res.ok) throw new Error("Error al guardar en base de datos");

        // B. AVISAR A N8N (AUTOMÁTICO)
        console.log("Avisando a n8n...");
        await fetch(N8N_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event: "registration_completed",
            user: nombreCompleto,
            phone: numero,
            match_id: matchId // <--- n8n ya sabe qué pichanga es
          })
        });

        // C. MOSTRAR ÉXITO
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('progress').style.display = 'none';
        document.getElementById('success-name').textContent = nombreCompleto;
        document.getElementById('success-screen').classList.add('active');

      } catch (e) {
        // ... (manejo de error igual) ...
      }
    };
</script>
