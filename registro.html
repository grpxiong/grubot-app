<script>
  const SUPABASE_URL = 'https://fzrpjbojyzzohcypgfzm.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_6WvoLA-b4diZ4_omsc-XUg_5iNrppdz';

  // Get numero from URL (handles %2B as +)
  const urlParams = new URLSearchParams(window.location.search);
  const numero = urlParams.get('numero');
  if (!numero) {
    document.querySelector('.header p').innerHTML += '<br><strong style="color: var(--error);">Faltó el número de teléfono en la URL.</strong>';
  }
  console.log('Numero from URL:', numero);

  // Populate day/year selects (unchanged)
  const selDay = document.getElementById('sel-day');
  for (let d = 1; d <= 31; d++) {
    const opt = document.createElement('option');
    opt.value = String(d).padStart(2, '0');
    opt.textContent = d;
    selDay.appendChild(opt);
  }
  const selYear = document.getElementById('sel-year');
  const currentYear = new Date().getFullYear();
  for (let y = currentYear - 5; y >= currentYear - 80; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    selYear.appendChild(opt);
  }

  const showStep = (n) => {
    document.querySelectorAll('.step').forEach((s, i) => s.classList.toggle('active', i === n));
    document.querySelectorAll('.progress-dot').forEach((dot, i) => {
      dot.classList.remove('active', 'done');
      if (i === n) dot.classList.add('active');
      else if (i < n) dot.classList.add('done');
    });
  };

  // Step 0 → 1 (unchanged)
  document.getElementById('btn-step0').onclick = () => {
    const nom = document.getElementById('input-nombre');
    const ape = document.getElementById('input-apellido');
    let valid = true;

    if (!nom.value.trim()) {
      nom.classList.add('error');
      document.getElementById('err-nombre').classList.add('visible');
      valid = false;
    } else {
      nom.classList.remove('error');
      document.getElementById('err-nombre').classList.remove('visible');
    }

    if (!ape.value.trim()) {
      ape.classList.add('error');
      document.getElementById('err-apellido').classList.add('visible');
      valid = false;
    } else {
      ape.classList.remove('error');
      document.getElementById('err-apellido').classList.remove('visible');
    }

    if (valid) showStep(1);
  };

  document.getElementById('back-step1').onclick = () => {
    document.getElementById('error-box').classList.remove('visible');
    showStep(0);
  };

  // Final submit - ADDED numero to payload
  document.getElementById('btn-submit').onclick = async () => {
    const d = selDay.value;
    const m = document.getElementById('sel-month').value;
    const y = selYear.value;
    const errFecha = document.getElementById('err-fecha');
    const errorBox = document.getElementById('error-box');
    const errorDetail = document.getElementById('error-detail');

    if (!d || !m || !y) {
      errFecha.classList.add('visible');
      return;
    }
    errFecha.classList.remove('visible');
    errorBox.classList.remove('visible');

    if (!numero) {
      errorDetail.textContent = 'Número de teléfono faltante en la URL.';
      errorBox.classList.add('visible');
      return;
    }

    const nombreCompleto = `${document.getElementById('input-nombre').value.trim()} ${document.getElementById('input-apellido').value.trim()}`;
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
      const payload = {
        nombre: nombreCompleto,
        fecha_nac: `${y}-${m}-${d}`,
        numero: numero  // ← ADDED: sends to Supabase table
      };

      console.log('Sending payload:', payload);

      const res = await fetch(`${SUPABASE_URL}/rest/v1/personas`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: JSON.stringify(payload)
      });

      const body = await res.json().catch(() => null);
      console.log('Supabase response:', res.status, body);

      if (!res.ok) {
        const msg = body?.message || body?.error || JSON.stringify(body) || `HTTP ${res.status}`;
        const hint = body?.hint ? `\nHint: ${body.hint}` : '';
        const detail = body?.details ? `\nDetalle: ${body.details}` : '';
        throw new Error(`[${res.status}] ${msg}${hint}${detail}`);
      }

      // Success (unchanged)
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('progress').style.display = 'none';
      document.getElementById('success-name').textContent = nombreCompleto;
      document.getElementById('success-screen').classList.add('active');

    } catch (e) {
      console.error('Error:', e);
      errorDetail.textContent = e.message;
      errorBox.classList.add('visible');
      errorBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      btn.disabled = false;
      btn.textContent = 'Registrarme ✓';
    }
  };
</script>
