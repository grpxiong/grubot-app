<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Jugador | Grubot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #059669; --primary-hover: #047857; --primary-light: rgba(5, 150, 105, 0.08);
      --primary-glow: rgba(5, 150, 105, 0.2); --bg: #f0fdf4; --bg-card: #ffffff;
      --bg-muted: #f8fafc; --border: #d1fae5; --border-focus: #059669;
      --text-main: #1e293b; --text-muted: #64748b; --error: #ef4444;
      --shadow: 0 20px 60px -10px rgba(5, 150, 105, 0.15), 0 4px 16px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: var(--bg); display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif; padding: 24px 16px;
      background-image: radial-gradient(ellipse at 20% 20%, rgba(5,150,105,0.08) 0%, transparent 60%);
    }
    .card { background: var(--bg-card); border-radius: 28px; width: 100%; max-width: 420px; padding: 40px 36px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .header { text-align: center; margin-bottom: 36px; }
    .header h1 { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--text-main); }
    .header h1 span { color: var(--primary); }
    .progress { display: flex; justify-content: center; gap: 8px; margin-bottom: 32px; }
    .progress-dot { width: 8px; height: 8px; border-radius: 100px; background: var(--border); }
    .progress-dot.active { width: 24px; background: var(--primary); }
    .step { display: none; flex-direction: column; gap: 20px; }
    .step.active { display: flex; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
    .field input, .date-helper select { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 14px; font-size: 16px; background: var(--bg-muted); outline: none; }
    .field input:focus { border-color: var(--border-focus); background: white; }
    .btn-primary { width: 100%; padding: 16px; border: none; border-radius: 14px; background: var(--primary); color: white; font-weight: 700; cursor: pointer; }
    .btn-primary:disabled { background: #94a3b8; }
    .error-box { background: #fef2f2; border: 1.5px solid #fecaca; border-radius: 14px; padding: 14px; display: none; margin-top: 10px; color: #ef4444; font-size: 13px; }
    .success { display: none; flex-direction: column; align-items: center; text-align: center; }
    .success.active { display: flex; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header" id="form-header">
      <h1>Únete al<br><span>equipo</span></h1>
      <p>Regístrate una vez para todas las pichangas.</p>
    </div>

    <div class="progress" id="progress">
      <div class="progress-dot active"></div>
      <div class="progress-dot"></div>
    </div>

    <div class="step active" id="step-0">
      <div class="field">
        <label>Nombre(s)</label>
        <input type="text" id="input-nombre" placeholder="Ej: Carlos">
      </div>
      <div class="field">
        <label>Apellido(s)</label>
        <input type="text" id="input-apellido" placeholder="Ej: Ramírez">
      </div>
      <button class="btn-primary" onclick="showStep(1)">Continuar →</button>
    </div>

    <div class="step" id="step-1">
      <div class="field">
        <label>Fecha de nacimiento</label>
        <div style="display: flex; gap: 8px;">
          <select id="sel-day"></select>
          <select id="sel-month">
            <option value="01">Enero</option><option value="02">Febrero</option><option value="03">Marzo</option>
            <option value="04">Abril</option><option value="05">Mayo</option><option value="06">Junio</option>
            <option value="07">Julio</option><option value="08">Agosto</option><option value="09">Septiembre</option>
            <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
          </select>
          <select id="sel-year"></select>
        </div>
      </div>
      <div class="error-box" id="error-box"></div>
      <button class="btn-primary" id="btn-submit">Registrarme ✓</button>
    </div>

    <div class="success" id="success-screen">
      <h2 style="margin-bottom: 10px;">¡Bienvenido! ✅</h2>
      <p>Quedaste registrado como <b id="success-name"></b> y anotado en la pichanga.</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const numRaw = urlParams.get('num') || urlParams.get('numero') || '';
    const cleanNumber = numRaw.replace(/\D/g, ''); 
    const numeroConPlus = cleanNumber ? `+${cleanNumber}` : null;
    const matchId = urlParams.get('match') || urlParams.get('match_id') || null;

    // Llenar selects
    const selDay = document.getElementById('sel-day');
    for(let i=1; i<=31; i++) selDay.innerHTML += `<option value="${String(i).padStart(2,'0')}">${i}</option>`;
    const selYear = document.getElementById('sel-year');
    const cy = new Date().getFullYear();
    for(let i=cy-5; i>=cy-70; i--) selYear.innerHTML += `<option value="${i}">${i}</option>`;

    function showStep(n) {
      document.querySelectorAll('.step').forEach((s, i) => s.classList.toggle('active', i === n));
      document.querySelectorAll('.progress-dot').forEach((d, i) => d.classList.toggle('active', i === n));
    }

    document.getElementById('btn-submit').onclick = async () => {
      const btn = document.getElementById('btn-submit');
      const nombre = document.getElementById('input-nombre').value.trim();
      const apellido = document.getElementById('input-apellido').value.trim();
      const fecha = `${document.getElementById('sel-year').value}-${document.getElementById('sel-month').value}-${document.getElementById('sel-day').value}`;
      
      if(!nombre || !apellido || !numeroConPlus) return alert("Faltan datos");

      btn.disabled = true;
      btn.textContent = "Procesando...";

      try {
        // 1. Guardar Persona
        await fetch(`${window.ENV.SUPABASE_URL}/rest/v1/personas`, {
          method: 'POST',
          headers: { 
            'apikey': window.ENV.SUPABASE_KEY, 
            'Authorization': `Bearer ${window.ENV.SUPABASE_KEY}`,
            'Content-Type': 'application/json' 
          },
          body: JSON.stringify({ nombre: `${nombre} ${apellido}`, fecha_nac: fecha, numero: numeroConPlus })
        });

        // 2. Anotar en Pichanga vía Edge Function
        if (matchId) {
          await new Promise(r => setTimeout(r, 600)); // Delay para consistencia
          await fetch(window.ENV.EDGE_FUNCTION_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${window.ENV.SUPABASE_KEY}` },
            body: JSON.stringify({ data: { fromNumber: numeroConPlus, body: `/anotarme ${matchId}` } })
          });
        }

        document.getElementById('step-1').style.display = 'none';
        document.getElementById('progress').style.display = 'none';
        document.getElementById('form-header').style.display = 'none';
        document.getElementById('success-name').textContent = `${nombre} ${apellido}`;
        document.getElementById('success-screen').classList.add('active');

      } catch (e) {
        btn.disabled = false;
        btn.textContent = "Error, reintentar";
      }
    };
  </script>
</body>
</html>
