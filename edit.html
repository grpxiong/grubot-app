<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Editar Pichanga</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary: #059669;
      --primary-hover: #047857;
      --primary-light: rgba(5, 150, 105, 0.09);
      --primary-glow: rgba(5, 150, 105, 0.18);
      --bg: #f0fdf4;
      --bg-card: #ffffff;
      --bg-input: #f4f9f6;
      --border: #d1fae5;
      --border-focus: #059669;
      --text-main: #0f1f17;
      --text-muted: #64748b;
      --text-light: #a1b5ab;
      --error: #ef4444;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text-main);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
    }

    .page {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 16px 14px 32px;
    }

    .header { padding: 10px 0 16px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 999px;
      background: var(--primary-light); color: var(--primary);
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .h1-brand {
      font-family: 'Syne', sans-serif;
      font-size: 24px; font-weight: 800;
      line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 4px;
    }
    .h1-brand span { color: var(--primary); }
    .subtitle { font-size: 13px; color: var(--text-muted); line-height: 1.4; }

    .form { display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      display: flex; flex-direction: column; gap: 10px;
      overflow: visible;
    }
    .card-label {
      font-size: 10px; font-weight: 700; color: var(--text-light);
      text-transform: uppercase; letter-spacing: 0.08em;
      padding-bottom: 2px; border-bottom: 1px solid var(--border);
    }

    .field { display: flex; flex-direction: column; gap: 4px; }
    .label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.03em; }

    .ui-input {
      width: 100%; height: 42px; padding: 0 11px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg-input); color: var(--text-main);
      font-family: inherit; font-size: 14px; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      min-width: 0;
    }
    .ui-input::placeholder { color: var(--text-light); }
    .ui-input:focus {
      border-color: var(--border-focus); background: #fff;
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    input[type="date"], input[type="time"] { -webkit-appearance: none; appearance: none; }
    #p-quota { text-align: right; letter-spacing: 1px; font-variant-numeric: tabular-nums; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* ── Google Places dropdown fixes ── */
    .pac-container {
      z-index: 99999 !important;
      background-color: var(--bg-card);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      font-family: 'DM Sans', sans-serif;
      margin-top: 4px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      pointer-events: auto;
    }
    .pac-item {
      padding: 10px 12px;
      cursor: pointer;
      border-top: 1px solid var(--bg-input);
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.4;
      padding-left: 12px;
    }
    .pac-item:hover { background-color: var(--primary-light); }
    .pac-item-query { color: var(--text-main); font-size: 14px; }
    .pac-matched { color: var(--primary); font-weight: 600; }
    .pac-logo:after { display: none; }
    .pac-icon, .pac-icon-marker { display: none; }
    .hdpi .pac-icon, .hdpi .pac-icon-marker { display: none; }

    /* Toggle */
    .toggle-row {
      display: flex; align-items: center;
      justify-content: space-between; padding: 2px 0;
    }
    .toggle-label { font-size: 13px; font-weight: 500; color: var(--text-main); }
    .switch { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--text-light); border-radius: 22px; transition: .25s;
    }
    .slider:before {
      position: absolute; content: "";
      height: 16px; width: 16px; left: 3px; bottom: 3px;
      background: white; border-radius: 50%; transition: .25s;
    }
    input:checked + .slider { background: var(--primary); }
    input:checked + .slider:before { transform: translateX(18px); }

    /* Segmented */
    .segmented { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .segmented input { display: none; }
    .btn-seg {
      display: flex; align-items: center; justify-content: center;
      height: 38px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg-input); color: var(--text-muted);
      font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em;
    }
    .segmented input:checked + .btn-seg {
      border-color: var(--primary); background: var(--primary-light); color: var(--primary);
    }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, #e8f5e9 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius-sm);
      height: 42px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Error */
    .error-box {
      background: var(--error-bg); border: 1.5px solid var(--error-border);
      border-radius: var(--radius-sm); padding: 10px 12px; display: none;
    }
    .error-box.visible { display: block; }
    .error-box strong { display: block; font-size: 12px; font-weight: 700; color: var(--error); margin-bottom: 3px; }
    .error-box code { display: block; font-size: 11px; color: #b91c1c; word-break: break-all; white-space: pre-wrap; font-family: monospace; line-height: 1.5; }

    /* Actions */
    .actions { display: flex; flex-direction: column; gap: 8px; padding-top: 2px; }
    .btn-primary {
      width: 100%; height: 48px;
      background: var(--primary); color: white; border: none;
      border-radius: var(--radius); font-family: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.15s, transform 0.1s, opacity 0.15s;
      box-shadow: 0 6px 16px -4px rgba(5,150,105,0.35); letter-spacing: 0.01em;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:active { transform: scale(0.985); }
    .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; }
    .btn-ghost {
      width: 100%; height: 38px; background: transparent; border: none;
      color: var(--text-muted); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
    }

    /* Success — pre-built in DOM, toggled via display */
    .success-view {
      display: none;
      text-align: center;
      padding: 48px 16px;
    }
    .success-view.active { display: block; }
    .success-icon {
      width: 64px; height: 64px; border-radius: 50%;
      display: grid; place-items: center;
      background: var(--primary-light); color: var(--primary);
      font-size: 28px; margin: 0 auto 16px;
    }
    .success-view h2 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .success-view p { color: var(--text-muted); font-size: 14px; line-height: 1.5; max-width: 26ch; margin: 0 auto; }

    @media (min-width: 480px) {
      body { padding: 24px 16px; }
      .page {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 20px 60px -10px rgba(5,150,105,0.12);
        margin-top: 24px;
        padding: 20px 18px 28px;
      }
    }
  </style>
</head>
<body>
  <main class="page" id="page">
    <!-- Header -->
    <header class="header" id="header-view">
      <div class="badge">✏️ Editar pichanga</div>
      <h1 class="h1-brand">Edita tu <span>partido</span></h1>
      <p class="subtitle">Actualiza los datos y guarda los cambios.</p>
    </header>

    <!-- Skeleton -->
    <div id="skeleton" class="form">
      <div class="card">
        <div class="skeleton" style="height:12px;width:60px;border-radius:4px"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
      <div class="card">
        <div class="skeleton" style="height:12px;width:80px;border-radius:4px"></div>
        <div class="grid-2"><div class="skeleton"></div><div class="skeleton"></div></div>
        <div class="grid-2"><div class="skeleton"></div><div class="skeleton"></div></div>
        <div class="skeleton"></div>
      </div>
      <div class="card">
        <div class="skeleton" style="height:12px;width:40px;border-radius:4px"></div>
        <div class="skeleton"></div>
        <div class="grid-2"><div class="skeleton"></div><div class="skeleton"></div></div>
        <div class="grid-2"><div class="skeleton"></div><div class="skeleton"></div></div>
      </div>
      <div class="skeleton" style="height:48px;border-radius:12px"></div>
    </div>

    <!-- Real form, hidden until data loads -->
    <form class="form" id="edit-form" style="display:none;">
      <!-- Evento -->
      <div class="card">
        <div class="card-label">Evento</div>
        <div class="field">
          <label class="label" for="p-title">Nombre</label>
          <input type="text" id="p-title" class="ui-input" placeholder="Ej: Los Galácticos" />
        </div>
        <div class="field">
          <label class="label" for="p-lugar">Lugar</label>
          <input type="text" id="p-lugar" class="ui-input" placeholder="Cancha o dirección" autocomplete="off" />
        </div>
      </div>

      <!-- Horario -->
      <div class="card">
        <div class="card-label">Horario &amp; Jugadores</div>
        <div class="grid-2">
          <div class="field">
            <label class="label" for="p-date">Fecha</label>
            <input type="date" id="p-date" class="ui-input" />
          </div>
          <div class="field">
            <label class="label" for="p-count">Jugadores</label>
            <input type="number" id="p-count" class="ui-input" min="2" />
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label class="label" for="p-start">Inicio</label>
            <input type="time" id="p-start" class="ui-input" />
          </div>
          <div class="field">
            <label class="label" for="p-end">Fin</label>
            <input type="time" id="p-end" class="ui-input" />
          </div>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Permitir suplentes</span>
          <label class="switch">
            <input type="checkbox" id="p-backups">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- Pago -->
      <div class="card">
        <div class="card-label">Pago</div>
        <div class="field">
          <label class="label" for="p-quota">Cuota por persona (S/)</label>
          <input type="text" id="p-quota" class="ui-input" inputmode="decimal" />
        </div>
        <div class="segmented">
          <div>
            <input type="radio" name="pay-method" id="cb-yape" checked />
            <label class="btn-seg" for="cb-yape">Yape</label>
          </div>
          <div>
            <input type="radio" name="pay-method" id="cb-plin" />
            <label class="btn-seg" for="cb-plin">Plin</label>
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label class="label" for="p-num">Número</label>
            <input type="text" id="p-num" class="ui-input" placeholder="999888777" inputmode="numeric" maxlength="9" pattern="[0-9]*" />
          </div>
          <div class="field">
            <label class="label" for="p-nom">Titular</label>
            <input type="text" id="p-nom" class="ui-input" placeholder="Nombre" />
          </div>
        </div>
      </div>

      <div class="error-box" id="error-box">
        <strong>Error al guardar</strong>
        <code id="error-detail"></code>
      </div>

      <div class="actions">
        <button type="submit" class="btn-primary" id="btn-save">Guardar cambios</button>
        <button type="button" class="btn-ghost" id="btn-cancel">Cancelar</button>
      </div>
    </form>

    <!-- Success (pre-built in DOM, hidden until needed) -->
    <div class="success-view" id="success-view">
      <div class="success-icon">✓</div>
      <h2>Cambios guardados</h2>
      <p>La pichanga fue actualizada correctamente.</p>
      <button class="btn-primary" style="margin-top:20px;max-width:200px" onclick="window.close()">Cerrar</button>
    </div>
  </main>

  <script src="config.js"></script>
  <script>
    const SUPABASE_URL = window.ENV.SUPABASE_URL;
    const SUPABASE_KEY = window.ENV.SUPABASE_KEY;

    const params = new URLSearchParams(window.location.search);
    const recordId = params.get('id');

    const skeleton = document.getElementById('skeleton');
    const editForm = document.getElementById('edit-form');
    const errorBox = document.getElementById('error-box');
    const errorDetail = document.getElementById('error-detail');
    const btnSave = document.getElementById('btn-save');
    const quotaInput = document.getElementById('p-quota');
    const phoneInput = document.getElementById('p-num');

    // ─── ATM-style quota input (right-to-left) ───
    let quotaCents = 0;

    quotaInput.addEventListener('keydown', (e) => {
      const allowed = ['Backspace', 'Delete', 'Tab', 'Escape', 'Enter',
                        'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'];
      if (allowed.includes(e.key)) {
        if (e.key === 'Backspace') {
          e.preventDefault();
          quotaCents = Math.floor(quotaCents / 10);
          quotaInput.value = (quotaCents / 100).toFixed(2);
        }
        return;
      }
      if (!/^[0-9]$/.test(e.key)) { e.preventDefault(); return; }
      e.preventDefault();
      if (quotaCents >= 999999) return;
      quotaCents = quotaCents * 10 + parseInt(e.key, 10);
      quotaInput.value = (quotaCents / 100).toFixed(2);
    });

    quotaInput.addEventListener('focus', () => { quotaInput.select(); });

    quotaInput.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData).getData('text');
      const digits = pasted.replace(/\D/g, '');
      if (digits) {
        quotaCents = parseInt(digits, 10);
        if (quotaCents > 999999) quotaCents = 999999;
        quotaInput.value = (quotaCents / 100).toFixed(2);
      }
    });

    // ─── Número input — only allow digits ───
    phoneInput.addEventListener('keydown', (e) => {
      const allowed = ['Backspace', 'Delete', 'Tab', 'Escape', 'Enter',
                        'ArrowLeft', 'ArrowRight', 'Home', 'End'];
      if (allowed.includes(e.key) || e.ctrlKey || e.metaKey) return;
      if (!/^[0-9]$/.test(e.key)) { e.preventDefault(); }
    });

    phoneInput.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData).getData('text');
      phoneInput.value = pasted.replace(/\D/g, '').slice(0, 9);
    });

    // ─── Google Places Autocomplete ───
    function initAutocomplete() {
      const input = document.getElementById('p-lugar');
      if (!input) return;

      const autocomplete = new google.maps.places.Autocomplete(input, {
        componentRestrictions: { country: 'pe' },
        fields: ['formatted_address', 'geometry', 'name'],
        types: ['establishment', 'geocode'],
      });

      const observer = new MutationObserver(() => {
        const pac = document.querySelector('.pac-container');
        if (pac && pac.parentElement !== document.body) {
          document.body.appendChild(pac);
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') e.preventDefault();
      });

      autocomplete.addListener('place_changed', () => {
        const place = autocomplete.getPlace();
        if (!place.geometry) return;
        const name = place.name || '';
        const addr = place.formatted_address || '';
        if (name && addr && !addr.startsWith(name)) {
          input.value = `${name}, ${addr}`;
        } else {
          input.value = addr || name;
        }
      });
    }

    // Load Google Maps API dynamically
    (function loadGoogle() {
      if (!window.ENV?.GOOGLE_MAPS_KEY) {
        console.warn('Falta GOOGLE_MAPS_KEY en config.js — Places autocomplete desactivado.');
        return;
      }
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${window.ENV.GOOGLE_MAPS_KEY}&libraries=places&callback=initAutocomplete`;
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    })();

    // ─── Helpers ───
    function showError(msg) {
      errorDetail.textContent = msg;
      errorBox.classList.add('visible');
      errorBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function hideError() {
      errorBox.classList.remove('visible');
    }

    // ─── Show success (toggle visibility, no DOM destruction) ───
    function showSuccess() {
      document.getElementById('header-view').style.display = 'none';
      document.getElementById('skeleton').style.display = 'none';
      document.getElementById('edit-form').style.display = 'none';
      document.getElementById('success-view').classList.add('active');
    }

    // ─── Load existing pichanga data ───
    if (!recordId) {
      skeleton.innerHTML = `<p style="color:var(--error);font-weight:600;font-size:14px;">⚠ No se encontró ID de pichanga en la URL.</p>`;
    } else {
      (async () => {
        try {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/pichangas?id_pichanga_pub=eq.${recordId}`, {
            headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
          });
          const data = await res.json();
          const p = data[0];
          if (!p) throw new Error('Pichanga no encontrada.');

          document.getElementById('p-title').value  = p.titulo || '';
          document.getElementById('p-lugar').value  = p.lugar || '';
          document.getElementById('p-date').value   = p.fecha_pichanga || '';
          document.getElementById('p-start').value  = p.hora_inicio || '';
          document.getElementById('p-end').value    = p.hora_fin || '';
          document.getElementById('p-count').value  = p.cantidad || '';
          document.getElementById('p-backups').checked = p.permite_backups ?? true;
          document.getElementById('p-num').value    = p.numero_pago || '';
          document.getElementById('p-nom').value    = p.titular_pago || '';

          const cuota = p.cuota || 0;
          quotaCents = Math.round(cuota * 100);
          document.getElementById('p-quota').value = cuota.toFixed(2);

          if (p.metodo_pago === 'PLIN') {
            document.getElementById('cb-plin').checked = true;
          } else {
            document.getElementById('cb-yape').checked = true;
          }

          skeleton.style.display = 'none';
          editForm.style.display = 'flex';

        } catch (err) {
          skeleton.innerHTML = `<p style="color:var(--error);font-weight:600;font-size:14px;">⚠ ${err.message}</p>`;
        }
      })();
    }

    document.getElementById('btn-cancel').addEventListener('click', () => window.history.back());

    // ─── Submit ───
    document.getElementById('edit-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const updateData = {
        titulo:          document.getElementById('p-title').value.trim(),
        lugar:           document.getElementById('p-lugar').value.trim(),
        fecha_pichanga:  document.getElementById('p-date').value,
        hora_inicio:     document.getElementById('p-start').value,
        hora_fin:        document.getElementById('p-end').value,
        cuota:           parseFloat(document.getElementById('p-quota').value),
        cantidad:        parseInt(document.getElementById('p-count').value, 10),
        permite_backups: document.getElementById('p-backups').checked,
        metodo_pago:     document.getElementById('cb-yape').checked ? 'YAPE' : 'PLIN',
        numero_pago:     document.getElementById('p-num').value.trim(),
        titular_pago:    document.getElementById('p-nom').value.trim(),
      };

      if (!updateData.lugar) {
        showError('El lugar no puede estar vacío.');
        return;
      }

      btnSave.disabled = true;
      btnSave.textContent = 'Guardando...';

      try {
        // 1. Update in Supabase
        const res = await fetch(`${SUPABASE_URL}/rest/v1/pichangas?id_pichanga_pub=eq.${recordId}`, {
          method: 'PATCH',
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            Prefer: 'return=representation'
          },
          body: JSON.stringify(updateData)
        });

        if (!res.ok) {
          const body = await res.json().catch(() => null);
          const msg = body?.message || body?.error || JSON.stringify(body) || `HTTP ${res.status}`;
          throw new Error(`[${res.status}] ${msg}`);
        }

        const data = await res.json();
        const updatedPichanga = data[0];

        // 2. Notify n8n — same pattern as working create form
        const n8nData = {
          event: 'pichanga_created',
          match_id: updatedPichanga.id_pichanga_pub,
          pichanga: updatedPichanga
        };

        try {
          await fetch(window.ENV.N8N_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(n8nData),
            keepalive: true
          });
          console.log('[Grubot] n8n request sent');
        } catch (n8nErr) {
          console.warn('[Grubot] n8n failed, record saved:', n8nErr);
        }

        // 3. Show success — only AFTER n8n fetch resolves
        showSuccess();

      } catch (err) {
        console.error('Error:', err);
        showError(err.message);
        btnSave.disabled = false;
        btnSave.textContent = 'Guardar cambios';
      }
    });
  </script>
</body>
</html>
