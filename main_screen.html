<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Grubot — Panel de Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#059669" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ═══════════════════════════════════════════
       AUTH GATE — Step 1: Phone
       ═══════════════════════════════════════════ -->
  <div class="auth-shell" id="auth-login">
    <div class="auth-logo">⚽</div>
    <h1>Bienvenido a <span>Grubot</span></h1>
    <p class="auth-sub">Ingresa tu número de WhatsApp para acceder al panel de tu grupo.</p>
    <div class="auth-form">
      <div class="phone-input-wrap">
        <div class="phone-prefix">🇵🇪 +51</div>
        <input type="tel" id="auth-phone" class="ui-input" placeholder="987 654 321" inputmode="numeric" maxlength="11" autocomplete="tel" />
      </div>
      <div class="auth-error" id="auth-error"></div>
      <button class="btn-primary" id="btn-login">Continuar</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       AUTH GATE — Step 2: OTP
       ═══════════════════════════════════════════ -->
  <div class="auth-shell" id="auth-otp" style="display:none;">
    <div class="auth-logo">🔐</div>
    <h1>Código de <span>acceso</span></h1>
    <p class="auth-sub">Ingresa el código de 6 dígitos que recibiste por WhatsApp.</p>
    <div class="auth-form">
      <div class="otp-wrap" id="otp-wrap">
        <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-idx="0" />
        <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-idx="1" />
        <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-idx="2" />
        <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-idx="3" />
        <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-idx="4" />
        <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" data-idx="5" />
      </div>
      <div class="auth-error" id="otp-error"></div>
      <button class="btn-primary" id="btn-verify" disabled>Verificar</button>
      <a class="auth-link" id="btn-resend" href="#">Reenviar código por WhatsApp</a>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       MAIN APP SHELL
       ═══════════════════════════════════════════ -->
  <div class="app" id="main-app" style="display:none;">

    <!-- ── Top Header ── -->
    <header class="top-header">
      <div class="header-left">
        <div class="header-logo">⚽</div>
        <span class="header-title" id="group-name">Pichanga Miércoles</span>
      </div>
      <div class="header-actions">
        <button class="btn-header" id="btn-sync" title="Sincronizar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
            <path d="M16 16h5v5"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── Content Area (screens load here) ── -->
    <div class="content" id="content">
      <!-- Loading skeleton shown while fetching a screen -->
      <div class="screen-loader" id="screen-loader">
        <div style="padding:14px;">
          <div class="card">
            <div class="skeleton" style="height:14px;width:90px;border-radius:4px"></div>
            <div class="skeleton" style="height:100px"></div>
          </div>
          <div class="card" style="margin-top:10px;">
            <div class="skeleton" style="height:14px;width:120px;border-radius:4px"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
              <div class="skeleton" style="height:72px"></div>
              <div class="skeleton" style="height:72px"></div>
              <div class="skeleton" style="height:72px"></div>
            </div>
          </div>
          <div class="card" style="margin-top:10px;">
            <div class="skeleton" style="height:14px;width:100px;border-radius:4px"></div>
            <div class="skeleton" style="height:40px"></div>
          </div>
        </div>
      </div>

      <!-- Screen HTML gets injected here -->
      <div id="screen-container" style="display:none;"></div>
    </div>

    <!-- ── Bottom Navigation ── -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-tab active" data-screen="partido">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        <span>Partido</span>
      </button>
      <button class="nav-tab" data-screen="jugadores">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Jugadores</span>
      </button>
      <button class="nav-tab" data-screen="pagos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        <span>Pagos</span>
      </button>
      <button class="nav-tab" data-screen="ajustes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span>Ajustes</span>
      </button>
    </nav>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>
  </div>

  <!-- ═══════════════════════════════════════════
       CONFIG + APP LOGIC
       ═══════════════════════════════════════════ -->
  <script src="config.js"></script>
  <script>
    // ══════════════════════════════════════════
    // GRUBOT APP — Core Logic
    // ══════════════════════════════════════════

    const APP = {
      currentScreen: null,
      screenCache: {},
    };

    // ── References ──
    const $  = (s) => document.querySelector(s);
    const $$ = (s) => document.querySelectorAll(s);

    const authLogin  = $('#auth-login');
    const authOtp    = $('#auth-otp');
    const mainApp    = $('#main-app');
    const content    = $('#content');
    const loader     = $('#screen-loader');
    const container  = $('#screen-container');

    // ══════════════════════════════════════════
    // TOAST SYSTEM
    // ══════════════════════════════════════════
    function toast(msg) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      $('#toast-container').appendChild(el);
      setTimeout(() => el.remove(), 2200);
    }

    // Make toast available globally for screen scripts
    window.grubot = { toast };

    // ══════════════════════════════════════════
    // AUTH FLOW
    // ══════════════════════════════════════════
    const authPhone = $('#auth-phone');
    const authError = $('#auth-error');

    // Format phone as user types
    authPhone.addEventListener('input', () => {
      let d = authPhone.value.replace(/\D/g, '').slice(0, 9);
      if (d.length > 6) d = d.slice(0,3) + ' ' + d.slice(3,6) + ' ' + d.slice(6);
      else if (d.length > 3) d = d.slice(0,3) + ' ' + d.slice(3);
      authPhone.value = d;
    });

    $('#btn-login').addEventListener('click', () => {
      const phone = authPhone.value.replace(/\D/g, '');
      if (phone.length < 9) {
        authError.textContent = 'Ingresa un número válido de 9 dígitos.';
        authError.classList.add('visible');
        return;
      }
      authError.classList.remove('visible');

      const btn = $('#btn-login');
      btn.disabled = true;
      btn.textContent = 'Verificando...';

      // TODO: Replace with real Supabase auth check
      // Check if phone exists in organizadores_grupos
      setTimeout(() => {
        authLogin.style.display = 'none';
        authOtp.style.display = 'flex';
        $('.otp-digit').focus();
        btn.disabled = false;
        btn.textContent = 'Continuar';
      }, 800);
    });

    // OTP input logic
    const otpDigits = $$('.otp-digit');

    otpDigits.forEach((input, idx) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/\D/g, '');
        e.target.value = val.slice(0, 1);
        if (val && idx < 5) otpDigits[idx + 1].focus();
        checkOtp();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && idx > 0) {
          otpDigits[idx - 1].focus();
        }
      });
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
        pasted.split('').forEach((d, i) => { if (otpDigits[i]) otpDigits[i].value = d; });
        if (pasted.length > 0) otpDigits[Math.min(pasted.length, 5)].focus();
        checkOtp();
      });
    });

    function checkOtp() {
      const code = Array.from(otpDigits).map(i => i.value).join('');
      $('#btn-verify').disabled = code.length < 6;
    }

    $('#btn-verify').addEventListener('click', () => {
      const btn = $('#btn-verify');
      btn.disabled = true;
      btn.textContent = 'Verificando...';

      // TODO: Replace with real OTP verification
      setTimeout(() => {
        authOtp.style.display = 'none';
        mainApp.style.display = 'flex';
        btn.disabled = false;
        btn.textContent = 'Verificar';
        toast('Sesión iniciada ✓');
        navigate('partido');
      }, 600);
    });

    $('#btn-resend').addEventListener('click', (e) => {
      e.preventDefault();
      toast('Código reenviado por WhatsApp');
    });

    // ══════════════════════════════════════════
    // SCREEN NAVIGATION
    // ══════════════════════════════════════════
    // Fetch a screen file — works on both http(s):// and file://
    function fetchScreen(url) {
      return new Promise((resolve, reject) => {
        // Try fetch first (works on http/https)
        if (window.location.protocol !== 'file:') {
          fetch(url)
            .then(res => { if (!res.ok) throw new Error(res.status); return res.text(); })
            .then(resolve)
            .catch(reject);
          return;
        }
        // Fallback: XMLHttpRequest (works on file://)
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onload = () => {
          if (xhr.status === 0 || xhr.status === 200) resolve(xhr.responseText);
          else reject(new Error('XHR ' + xhr.status));
        };
        xhr.onerror = () => reject(new Error('XHR network error'));
        xhr.send();
      });
    }

    async function navigate(screen) {
      if (APP.currentScreen === screen) return;
      APP.currentScreen = screen;

      // Update nav tabs
      $$('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.screen === screen));

      // Show loader, hide container
      loader.style.display = 'block';
      container.style.display = 'none';

      // Scroll content to top
      content.scrollTop = 0;

      try {
        let html;

        // Check cache first
        if (APP.screenCache[screen]) {
          html = APP.screenCache[screen];
        } else {
          html = await fetchScreen(`screens/${screen}.html`);
          APP.screenCache[screen] = html;
        }

        // Inject HTML
        container.innerHTML = html;

        // Execute any <script> tags inside the loaded screen
        container.querySelectorAll('script').forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          oldScript.parentNode.replaceChild(newScript, oldScript);
        });

        // Show container, hide loader
        loader.style.display = 'none';
        container.style.display = 'block';

      } catch (err) {
        console.error('Navigation error:', err);
        loader.style.display = 'none';
        container.style.display = 'block';
        container.innerHTML = `
          <div style="padding:14px;">
            <div class="card" style="text-align:center;padding:40px 20px;">
              <div style="font-size:40px;margin-bottom:12px;opacity:0.4;">📡</div>
              <h3 style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:6px;">
                No se pudo cargar
              </h3>
              <p style="font-size:13px;color:var(--text-muted);max-width:24ch;margin:0 auto 16px;">
                Verifica tu conexión e intenta de nuevo.
              </p>
              <button class="btn-secondary" onclick="APP.currentScreen=null;navigate('${screen}')" style="max-width:200px;margin:0 auto;">
                Reintentar
              </button>
            </div>
          </div>`;
      }
    }

    // Nav tab clicks
    $$('.nav-tab').forEach(tab => {
      tab.addEventListener('click', () => navigate(tab.dataset.screen));
    });

    // ══════════════════════════════════════════
    // SYNC BUTTON
    // ══════════════════════════════════════════
    $('#btn-sync').addEventListener('click', function() {
      this.classList.add('syncing');
      // Clear cache so screens reload fresh
      APP.screenCache = {};
      setTimeout(() => {
        this.classList.remove('syncing');
        toast('Datos sincronizados ✓');
        // Reload current screen
        const current = APP.currentScreen;
        APP.currentScreen = null;
        navigate(current);
      }, 1000);
    });

    // ══════════════════════════════════════════
    // INITIAL LOAD
    // ══════════════════════════════════════════

    // Skip auth for development — comment these three lines for production:
    authLogin.style.display = 'none';
    mainApp.style.display = 'flex';
    navigate('partido');
  </script>
</body>
</html>
