<!DOCTYPE html>
<html>
<head><title>Organizador de Pichangas</title></head>
<body>
  <script>
    (function() {

    const SUPABASE_URL = 'https://fzrpjbojyzzohcypgfzm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6cnBqYm9qeXp6b2hjeXBnZnptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTk2MDksImV4cCI6MjA4OTAzNTYwOX0.FDFxmmvas5cYAzXiCIDOkWk-h5cRxUchueBUdbY8JG0';
      
    // 1. Create the Overlay
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:10000;display:flex;align-items:center;justify-content:center;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;';

    // 2. Create the Form Container
    const form = document.createElement('div');
    form.style.cssText = 'background:white;padding:24px;border-radius:20px;width:380px;display:flex;flex-direction:column;gap:14px;box-shadow: 0 10px 25px rgba(0,0,0,0.5);max-height:95vh;overflow-y:auto;';

    // Header
    const header = document.createElement('div');
    const hTitle = document.createElement('h2');
    hTitle.textContent = '⚽ Nueva Pichanga ⚽';
    hTitle.style.cssText = 'margin:0;color:#128C7E;font-size:20px;font-weight:800;text-align:center;';
    header.append(hTitle);
    form.appendChild(header);

    const labelStyle = 'font-size:11px; font-weight:700; color:#666; margin-bottom:4px; display:block; text-transform:uppercase;';
    const inputStyle = 'width:100%; padding:10px; padding-right:30px; border:1.5px solid #e0e0e0; border-radius:10px; font-size:14px; box-sizing:border-box; outline:none;';
    const clearBtnStyle = 'position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer; color:#ccc; font-weight:bold; font-size:14px; user-select:none; padding:5px;';

    // Helper to create a clear button
    const addClearButton = (input, container) => {
        const btn = document.createElement('span');
        btn.textContent = '✕';
        btn.style.cssText = clearBtnStyle;
        btn.onclick = () => {
            input.value = '';
            input.focus();
        };
        container.style.position = 'relative';
        container.appendChild(btn);
    };

    const createField = (labelTxt, id, value, type = "text", min = "", hasClear = false) => {
        const div = document.createElement('div');
        const label = document.createElement('label');
        label.textContent = labelTxt;
        label.style.cssText = labelStyle;
        
        const inputWrapper = document.createElement('div');
        inputWrapper.style.position = 'relative';
        
        const input = document.createElement('input');
        input.type = type; input.id = id; input.value = value;
        if (min) input.min = min;
        input.style.cssText = inputStyle;
        
        inputWrapper.appendChild(input);
        if (hasClear) addClearButton(input, inputWrapper);
        
        div.append(label, inputWrapper);
        return { div, input };
    };

    form.appendChild(createField('Título', 'p-title', 'PICHANGUITA #07', 'text', '', true).div);
    form.appendChild(createField('Lugar', 'p-lugar', 'Estadio Municipal Julio Montjoy Guizado (Jr. Santo Cristo 584, Surco)', 'text', '', true).div);

    // Fecha
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    const minStr = tomorrow.toISOString().split('T')[0];
    form.appendChild(createField('Fecha', 'p-date', minStr, 'date', minStr).div);

    // Hora
    const timeDiv = document.createElement('div');
    const timeLabel = document.createElement('label');
    timeLabel.textContent = 'Hora';
    timeLabel.style.cssText = labelStyle;
    const timeFlex = document.createElement('div');
    timeFlex.style.cssText = 'display:flex; gap:8px;';
    const startInput = document.createElement('input'); startInput.type='time'; startInput.value='00:00'; startInput.style.cssText = inputStyle;
    const endInput = document.createElement('input'); endInput.type='time'; endInput.value='01:00'; endInput.style.cssText = inputStyle;
    timeFlex.append(startInput, endInput); timeDiv.append(timeLabel, timeFlex);
    form.appendChild(timeDiv);

    // Quota and Players
    const rowRow = document.createElement('div');
    rowRow.style.cssText = 'display:grid; grid-template-columns: 1fr 1fr; gap:12px;';
    
    const qField = createField('Cuota (S/)', 'p-quota', '00.00');
    const qIn = qField.input;
    qIn.style.textAlign = 'right';
    qIn.style.fontFamily = 'monospace';

    const lockCursor = (el) => {
        setTimeout(() => {
            const len = el.value.length;
            el.setSelectionRange(len, len);
        }, 0);
    };

    ['focus', 'click', 'keyup'].forEach(evt => {
        qIn.addEventListener(evt, () => lockCursor(qIn));
    });

    qIn.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\D/g, "");
        e.target.value = (parseInt(val || 0) / 100).toFixed(2);
        lockCursor(e.target);
    });

    rowRow.appendChild(qField.div);
    rowRow.appendChild(createField('N° Jugadores', 'p-count', '10', 'number').div);
    form.appendChild(rowRow);

    // Payment Section
    const paySection = document.createElement('div');
    paySection.style.cssText = 'background:#f7f9f9; padding:16px; border-radius:12px; border:1px solid #edf2f2; display:flex; flex-direction:column; gap:10px;';
    const payLabel = document.createElement('label');
    payLabel.textContent = 'Método de Pago';
    payLabel.style.cssText = labelStyle;
    paySection.appendChild(payLabel);

    const selectorRow = document.createElement('div');
    selectorRow.style.cssText = 'display:flex; gap:20px; margin-bottom:5px;';

    const createCheck = (name) => {
        const lbl = document.createElement('label');
        lbl.style.cssText = 'display:flex; align-items:center; gap:6px; font-size:14px; font-weight:600; cursor:pointer;';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        lbl.append(cb, name);
        return { lbl, cb };
    };

    const yape = createCheck('YAPE');
    const plin = createCheck('PLIN');
    selectorRow.append(yape.lbl, plin.lbl);
    paySection.appendChild(selectorRow);

    // Payment inputs with Clear buttons
    const payInputs = document.createElement('div');
    payInputs.style.cssText = 'display:flex; gap:8px;';

    const numWrapper = document.createElement('div');
    numWrapper.style.cssText = 'flex:1; position:relative;';
    const numIn = document.createElement('input'); 
    numIn.placeholder = 'Número'; numIn.maxLength = 9; numIn.disabled = true; numIn.value = "";
    numIn.style.cssText = inputStyle.replace('width:100%', 'width:100%; font-size:12px;');
    numWrapper.appendChild(numIn);
    addClearButton(numIn, numWrapper);

    const nomWrapper = document.createElement('div');
    nomWrapper.style.cssText = 'flex:1.5; position:relative;';
    const nomIn = document.createElement('input'); 
    nomIn.placeholder = 'Titular'; nomIn.disabled = true; nomIn.value = "";
    nomIn.style.cssText = inputStyle.replace('width:100%', 'width:100%; font-size:12px;');
    nomWrapper.appendChild(nomIn);
    addClearButton(nomIn, nomWrapper);

    payInputs.append(numWrapper, nomWrapper);
    paySection.appendChild(payInputs);
    form.appendChild(paySection);

    // Exclusive Checkbox Logic
    const handleCheck = (current, other) => {
        if (current.checked) {
            other.checked = false;
            numIn.disabled = false; nomIn.disabled = false;
        } else if (!other.checked) {
            numIn.disabled = true; nomIn.disabled = true;
        }
    };
    yape.cb.onchange = () => handleCheck(yape.cb, plin.cb);
    plin.cb.onchange = () => handleCheck(plin.cb, yape.cb);

    // Footer
    const btnGen = document.createElement('button');
    btnGen.textContent = 'Crear Lista';
    btnGen.style.cssText = 'width:100%; padding:14px; border:none; border-radius:12px; background:#25D366; color:white; font-weight:bold; font-size:16px; cursor:pointer; margin-top:10px;';

    const btnCancel = document.createElement('button');
    btnCancel.textContent = 'Cancelar';
    btnCancel.style.cssText = 'width:100%; background:none; border:none; color:#999; font-size:12px; cursor:pointer;';

    form.append(btnGen, btnCancel);
    overlay.appendChild(form);
    document.body.appendChild(overlay);

    const clean = () => overlay.remove();
    btnCancel.onclick = clean;

    btnGen.onclick = () => {
        const title = document.getElementById('p-title').value;
        const lugar = document.getElementById('p-lugar').value;
        const dateVal = document.getElementById('p-date').value;
        const quota = document.getElementById('p-quota').value;
        const count = parseInt(document.getElementById('p-count').value);
        const saveToDb = async () => {
          await fetch(`${SUPABASE_URL}/rest/v1/pichangas`, {
              method: 'POST',
              headers: {
                  'apikey': SUPABASE_KEY,
                  'Authorization': `Bearer ${SUPABASE_KEY}`,
                  'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                  title: title,
                  lugar: lugar,
                  fecha: capDate,
                  quota: quota
              })
          });
        };

        saveToDb();

        if(!dateVal) return alert("Selecciona una fecha");

        // --- NEW IMPROVED DATE FORMATTING ---
        const dateObj = new Date(dateVal + 'T12:00:00');
        let fDate = dateObj.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
        
        // Split by spaces to capitalize each relevant word (Weekday and Month)
        // Example: "viernes, 13 de marzo" -> "Viernes, 13 de Marzo"
        const capDate = fDate.split(' ').map(word => {
            if (word.length <= 2) return word; // skip "de"
            return word.charAt(0).toUpperCase() + word.slice(1);
        }).join(' ');
        // ------------------------------------

        const toAmPm = (t) => {
            let [h, m] = t.split(':');
            h = parseInt(h);
            return `${h % 12 || 12}:${m} ${h >= 12 ? 'PM' : 'AM'}`;
        };

        let method = yape.cb.checked ? "YAPE" : (plin.cb.checked ? "PLIN" : "");
        let payLine = method ? `\`\`\`${method} al ${numIn.value} (${nomIn.value})\`\`\`` : "```Pago por definir```";

        let slots = "";
        for (let i = 1; i <= count; i++) {
            slots += `\`${i < 10 ? '0' + i : i}\` \n`;
        }

        const msg = `*\`[ ${title.toUpperCase()} ]\`*
*Fecha:*   \`${capDate}\`
              *\`${toAmPm(startInput.value)} - ${toAmPm(endInput.value)}\`*

*Lugar:*   *\`${lugar}\`*

*Cuota:*   *\`S/ ${quota}\`*
${payLine}

${slots}`;

        navigator.clipboard.writeText(msg).then(() => {
            alert("¡Copiado!");
            clean();
        });
    };
})();

  </script>
</body>
</html>
