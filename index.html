<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Organizador de Pichangas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary: #059669;
      --primary-hover: #047857;
      --primary-light: rgba(5, 150, 105, 0.09);
      --primary-glow: rgba(5, 150, 105, 0.18);
      --bg: #f0fdf4;
      --bg-card: #ffffff;
      --bg-input: #f4f9f6;
      --border: #d1fae5;
      --border-focus: #059669;
      --text-main: #0f1f17;
      --text-muted: #64748b;
      --text-light: #a1b5ab;
      --error: #ef4444;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text-main);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
    }

    /* ── Layout ── */
    .page {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 16px 14px 32px;
    }

    /* ── Header ── */
    .header {
      padding: 10px 0 16px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .h1-brand {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }
    .h1-brand span { color: var(--primary); }
    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ── Form ── */
    .form { display: flex; flex-direction: column; gap: 12px; }

    /* ── Section card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding-bottom: 2px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Field ── */
    .field { display: flex; flex-direction: column; gap: 4px; }
    .label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    /* ── Inputs ── */
    .ui-input {
      width: 100%;
      height: 42px;
      padding: 0 11px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-input);
      color: var(--text-main);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      min-width: 0;
    }
    .ui-input::placeholder { color: var(--text-light); }
    .ui-input:focus {
      border-color: var(--border-focus);
      background: #fff;
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    input[type="date"], input[type="time"] {
      -webkit-appearance: none;
      appearance: none;
    }
    #p-quota { text-align: right; letter-spacing: 1px; font-variant-numeric: tabular-nums; }

    /* ── Grid ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    /* ── Toggle ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 0;
    }
    .toggle-label { font-size: 13px; font-weight: 500; color: var(--text-main); }
    .switch { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--text-light);
      border-radius: 22px;
      transition: .25s;
    }
    .slider:before {
      position: absolute; content: "";
      height: 16px; width: 16px;
      left: 3px; bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: .25s;
    }
    input:checked + .slider { background: var(--primary); }
    input:checked + .slider:before { transform: translateX(18px); }

    /* ── Segmented ── */
    .segmented { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .segmented input { display: none; }
    .btn-seg {
      display: flex; align-items: center; justify-content: center;
      height: 38px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-input);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }
    .segmented input:checked + .btn-seg {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 2px 0;
    }

    /* ── Error ── */
    .error-box {
      background: var(--error-bg);
      border: 1.5px solid var(--error-border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      display: none;
    }
    .error-box.visible { display: block; }
    .error-box strong { display: block; font-size: 12px; font-weight: 700; color: var(--error); margin-bottom: 3px; }
    .error-box code { display: block; font-size: 11px; color: #b91c1c; word-break: break-all; white-space: pre-wrap; font-family: monospace; line-height: 1.5; }

    /* ── Actions ── */
    .actions { display: flex; flex-direction: column; gap: 8px; padding-top: 2px; }
    .btn-primary {
      width: 100%; height: 48px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      box-shadow: 0 6px 16px -4px rgba(5,150,105,0.35);
      letter-spacing: 0.01em;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:active { transform: scale(0.985); }
    .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; }
    .btn-ghost {
      width: 100%; height: 38px;
      background: transparent; border: none;
      color: var(--text-muted);
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }

    /* ── Success ── */
    .success {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; padding: 48px 16px 16px;
    }
    .success-icon {
      width: 64px; height: 64px; border-radius: 50%;
      display: grid; place-items: center;
      background: var(--primary-light);
      color: var(--primary); font-size: 28px;
      margin-bottom: 16px;
    }
    .success h2 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .success p { color: var(--text-muted); font-size: 14px; line-height: 1.5; max-width: 26ch; }

    @media (min-width: 480px) {
      body { padding: 24px 16px; }
      .page {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 20px 60px -10px rgba(5,150,105,0.12);
        margin-top: 24px;
        padding: 20px 18px 28px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div class="badge">⚽ Nueva pichanga</div>
      <h1 class="h1-brand">Organiza tu <span>partido</span></h1>
      <p class="subtitle">Completa los datos y el bot hará el resto.</p>
    </header>

    <form class="form" id="pichanga-form">

      <!-- Evento -->
      <div class="card">
        <div class="card-label">Evento</div>
        <div class="field">
          <label class="label" for="p-title">Nombre</label>
          <input type="text" id="p-title" class="ui-input" value="PICHANGUITA #07" placeholder="Ej: Los Galácticos" />
        </div>
        <div class="field">
          <label class="label" for="p-lugar">Lugar</label>
          <input type="text" id="p-lugar" class="ui-input" placeholder="Cancha o dirección" />
        </div>
      </div>

      <!-- Horario -->
      <div class="card">
        <div class="card-label">Horario &amp; Jugadores</div>
        <div class="grid-2">
          <div class="field">
            <label class="label" for="p-date">Fecha</label>
            <input type="date" id="p-date" class="ui-input" />
          </div>
          <div class="field">
            <label class="label" for="p-count">Jugadores</label>
            <input type="number" id="p-count" class="ui-input" value="10" min="2" />
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label class="label" for="p-start">Inicio</label>
            <input type="time" id="p-start" class="ui-input" value="19:00" />
          </div>
          <div class="field">
            <label class="label" for="p-end">Fin</label>
            <input type="time" id="p-end" class="ui-input" value="20:00" />
          </div>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Permitir suplentes</span>
          <label class="switch">
            <input type="checkbox" id="p-backups" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- Pago -->
      <div class="card">
        <div class="card-label">Pago</div>
        <div class="field">
          <label class="label" for="p-quota">Cuota por persona (S/)</label>
          <input type="text" id="p-quota" class="ui-input" value="0.00" inputmode="decimal" />
        </div>
        <div class="segmented">
          <div>
            <input type="radio" name="pay-method" id="cb-yape" checked />
            <label class="btn-seg" for="cb-yape">Yape</label>
          </div>
          <div>
            <input type="radio" name="pay-method" id="cb-plin" />
            <label class="btn-seg" for="cb-plin">Plin</label>
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label class="label" for="p-num">Número</label>
            <input type="text" id="p-num" class="ui-input" placeholder="999888777" inputmode="numeric" maxlength="9" />
          </div>
          <div class="field">
            <label class="label" for="p-nom">Titular</label>
            <input type="text" id="p-nom" class="ui-input" placeholder="Nombre" />
          </div>
        </div>
      </div>

      <div class="error-box" id="error-box">
        <strong>Error al publicar</strong>
        <code id="error-detail"></code>
      </div>

      <div class="actions">
        <button type="submit" class="btn-primary" id="btn-crear">Publicar lista</button>
        <button type="button" class="btn-ghost" id="btn-cancel">Cancelar</button>
      </div>
    </form>
  </main>

  <script src="config.js"></script>
  <script>
    const SUPABASE_URL = window.ENV.SUPABASE_URL;
    const SUPABASE_KEY = window.ENV.SUPABASE_KEY;

    const form = document.getElementById('pichanga-form');
    const createBtn = document.getElementById('btn-crear');
    const quotaInput = document.getElementById('p-quota');
    const phoneInput = document.getElementById('p-num');
    const dateInput = document.getElementById('p-date');
    const errorBox = document.getElementById('error-box');
    const errorDetail = document.getElementById('error-detail');

    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    dateInput.value = tomorrow.toISOString().split('T')[0];
    dateInput.min = new Date().toISOString().split('T')[0];

    const lockCursor = (el) => setTimeout(() => { const l = el.value.length; el.setSelectionRange(l, l); }, 0);
    ['focus', 'click', 'keyup'].forEach(evt => quotaInput.addEventListener(evt, () => lockCursor(quotaInput)));
    quotaInput.addEventListener('input', (e) => {
      let val = e.target.value.replace(/\D/g, '');
      e.target.value = (parseInt(val || 0, 10) / 100).toFixed(2);
      lockCursor(e.target);
    });

    phoneInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '').slice(0, 9);
    });

    document.getElementById('btn-cancel').addEventListener('click', () => window.close());

    function showError(msg) {
      errorDetail.textContent = msg;
      errorBox.classList.add('visible');
      errorBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function hideError() {
      errorBox.classList.remove('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const payload = {
        titulo: document.getElementById('p-title').value.trim(),
        lugar: document.getElementById('p-lugar').value.trim(),
        fecha_pichanga: document.getElementById('p-date').value,
        hora_inicio: document.getElementById('p-start').value,
        hora_fin: document.getElementById('p-end').value,
        cuota: parseFloat(document.getElementById('p-quota').value),
        metodo_pago: document.getElementById('cb-yape').checked ? 'YAPE' : 'PLIN',
        numero_pago: document.getElementById('p-num').value.trim(),
        titular_pago: document.getElementById('p-nom').value.trim(),
        cantidad: parseInt(document.getElementById('p-count').value, 10),
        permite_backups: document.getElementById('p-backups').checked
      };

      if (!payload.lugar || !payload.numero_pago) {
        showError('Completa el lugar y el número de pago.');
        return;
      }

      createBtn.disabled = true;
      createBtn.textContent = 'Publicando...';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/pichangas`, {
          method: 'POST',
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            Prefer: 'return=representation'
          },
          body: JSON.stringify(payload)
        });

        const body = await res.json().catch(() => null);

        if (!res.ok) {
          const msg = body?.message || body?.error || JSON.stringify(body) || `HTTP ${res.status}`;
          const hint = body?.hint ? `\nHint: ${body.hint}` : '';
          const detail = body?.details ? `\nDetalle: ${body.details}` : '';
          throw new Error(`[${res.status}] ${msg}${hint}${detail}`);
        }

        const newPichanga = body[0];

        await fetch('http://216.238.104.205:5678/webhook/1ada8f2d-1ba6-4b0b-b755-caf712fbb699', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event: 'pichanga_created',
            match_id: newPichanga.id_pichanga_pub,
            pichanga: newPichanga
          })
        }).catch(err => console.warn('n8n notify failed (non-blocking):', err));

        document.querySelector('.page').innerHTML = `
          <section class="success">
            <div class="success-icon">✓</div>
            <h2>Lista publicada</h2>
            <p>El bot enviará el mensaje al grupo en breve.</p>
            <button class="btn-primary" style="margin-top:20px;max-width:200px" onclick="window.close()">Cerrar</button>
          </section>
        `;
      } catch (error) {
        console.error('Supabase error:', error);
        showError(error.message);
        createBtn.disabled = false;
        createBtn.textContent = 'Publicar lista';
      }
    });
  </script>
</body>
</html>
