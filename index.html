<body>
  <main class="page">
    </main>

  <script src="config.js"></script>
  <script>
    // 1. DEFINIR FUNCIONES GLOBALES PRIMERO (Para el callback de Google Maps)
    function initAutocomplete() {
      const input = document.getElementById('p-lugar');
      if (!input) return;

      const autocomplete = new google.maps.places.Autocomplete(input, {
        componentRestrictions: { country: 'pe' },
        fields: ['formatted_address', 'geometry', 'name'],
        types: ['establishment', 'geocode'],
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') e.preventDefault();
      });

      autocomplete.addListener('place_changed', () => {
        const place = autocomplete.getPlace();
        if (!place.geometry) return;
        input.value = place.formatted_address || place.name;
      });
    }

    // 2. CARGA DINÁMICA (Después de definir la función)
    (function loadGoogleMaps() {
      if (!window.ENV.GOOGLE_MAPS_KEY) {
        console.error("Falta GOOGLE_MAPS_KEY en config.js");
        return;
      }
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${window.ENV.GOOGLE_MAPS_KEY}&libraries=places&callback=initAutocomplete`;
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    })();

    // 3. LÓGICA DEL FORMULARIO
    const SUPABASE_URL = window.ENV.SUPABASE_URL;
    const SUPABASE_KEY = window.ENV.SUPABASE_KEY;

    const form = document.getElementById('pichanga-form');
    const createBtn = document.getElementById('btn-crear');
    const quotaInput = document.getElementById('p-quota');
    const phoneInput = document.getElementById('p-num');
    const dateInput = document.getElementById('p-date');
    const errorBox = document.getElementById('error-box');
    const errorDetail = document.getElementById('error-detail');

    // Configuración de fecha mínima (Mañana)
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    dateInput.value = tomorrow.toISOString().split('T')[0];
    dateInput.min = new Date().toISOString().split('T')[0];

    // Formateo de moneda (Cuota)
    const lockCursor = (el) => setTimeout(() => { const l = el.value.length; el.setSelectionRange(l, l); }, 0);
    ['focus', 'click', 'keyup'].forEach(evt => quotaInput.addEventListener(evt, () => lockCursor(quotaInput)));
    
    quotaInput.addEventListener('input', (e) => {
      let val = e.target.value.replace(/\D/g, '');
      e.target.value = (parseInt(val || 0, 10) / 100).toFixed(2);
      lockCursor(e.target);
    });

    // Validación de teléfono
    phoneInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '').slice(0, 9);
    });

    document.getElementById('btn-cancel').addEventListener('click', () => window.close());

    function showError(msg) {
      errorDetail.textContent = msg;
      errorBox.classList.add('visible');
      errorBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function hideError() {
      errorBox.classList.remove('visible');
    }

    // SUBMIT DEL FORMULARIO
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const payload = {
        titulo:          document.getElementById('p-title').value.trim(),
        lugar:           document.getElementById('p-lugar').value.trim(),
        fecha_pichanga:  document.getElementById('p-date').value,
        hora_inicio:     document.getElementById('p-start').value,
        hora_fin:        document.getElementById('p-end').value,
        cuota:           parseFloat(document.getElementById('p-quota').value),
        metodo_pago:     document.getElementById('cb-yape').checked ? 'YAPE' : 'PLIN',
        numero_pago:     document.getElementById('p-num').value.trim(),
        titular_pago:    document.getElementById('p-nom').value.trim(),
        cantidad:        parseInt(document.getElementById('p-count').value, 10),
        permite_backups: document.getElementById('p-backups').checked
      };

      if (!payload.lugar || !payload.numero_pago) {
        showError('Completa el lugar y el número de pago.');
        return;
      }

      createBtn.disabled = true;
      createBtn.textContent = 'Publicando...';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/pichangas`, {
          method: 'POST',
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            Prefer: 'return=representation'
          },
          body: JSON.stringify(payload)
        });

        const body = await res.json().catch(() => null);

        if (!res.ok) {
          const msg = body?.message || body?.error || JSON.stringify(body) || `HTTP ${res.status}`;
          throw new Error(`[${res.status}] ${msg}`);
        }

        const newPichanga = body[0];

        // NOTIFICACIÓN A N8N (Usando la variable de entorno)
        await fetch(window.ENV.N8N_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event: 'pichanga_created',
            match_id: newPichanga.id_pichanga_pub,
            pichanga: newPichanga
          })
        }).catch(err => console.warn('n8n notify failed:', err));

        // PANTALLA DE ÉXITO
        document.querySelector('.page').innerHTML = `
          <section class="success">
            <div class="success-icon">✓</div>
            <h2>Lista publicada</h2>
            <p>El bot enviará el mensaje al grupo en breve.</p>
            <button class="btn-primary" style="margin-top:20px;max-width:200px" onclick="window.close()">Cerrar</button>
          </section>
        `;
      } catch (error) {
        console.error('Error:', error);
        showError(error.message);
        createBtn.disabled = false;
        createBtn.textContent = 'Publicar lista';
      }
    });
  </script>
</body>
