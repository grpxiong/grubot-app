<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Organizador de Pichangas | Grubot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary: #059669;
      --primary-hover: #047857;
      --primary-light: rgba(5, 150, 105, 0.09);
      --primary-glow: rgba(5, 150, 105, 0.18);
      --bg: #f0fdf4;
      --bg-card: #ffffff;
      --bg-input: #f4f9f6;
      --border: #d1fae5;
      --border-focus: #059669;
      --text-main: #0f1f17;
      --text-muted: #64748b;
      --text-light: #a1b5ab;
      --error: #ef4444;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text-main);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
    }

    .page {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 16px 14px 32px;
    }

    .header { padding: 10px 0 16px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 999px;
      background: var(--primary-light); color: var(--primary);
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .h1-brand {
      font-family: 'Syne', sans-serif;
      font-size: 24px; font-weight: 800;
      line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 4px;
    }
    .h1-brand span { color: var(--primary); }
    .subtitle { font-size: 13px; color: var(--text-muted); line-height: 1.4; }

    .form { display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      display: flex; flex-direction: column; gap: 10px;
      overflow: visible;
    }
    .card-label {
      font-size: 10px; font-weight: 700; color: var(--text-light);
      text-transform: uppercase; letter-spacing: 0.08em;
      padding-bottom: 2px; border-bottom: 1px solid var(--border);
    }

    .field { display: flex; flex-direction: column; gap: 4px; }
    .label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.03em; }

    .ui-input {
      width: 100%; height: 42px; padding: 0 11px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg-input); color: var(--text-main);
      font-family: inherit; font-size: 14px; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .ui-input:focus {
      border-color: var(--border-focus); background: #fff;
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* ── Google Places dropdown fixes ── */
    .pac-container {
      z-index: 99999 !important;
      background-color: var(--bg-card);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      font-family: 'DM Sans', sans-serif;
      margin-top: 4px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      pointer-events: auto;
    }
    .pac-item {
      padding: 10px 12px;
      cursor: pointer;
      border-top: 1px solid var(--bg-input);
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.4;
      padding-left: 12px;
    }
    .pac-item:hover { background-color: var(--primary-light); }
    .pac-item-query { color: var(--text-main); font-size: 14px; }
    .pac-matched { color: var(--primary); font-weight: 600; }
    .pac-logo:after { display: none; }
    .pac-icon, .pac-icon-marker { display: none; }
    .hdpi .pac-icon, .hdpi .pac-icon-marker { display: none; }

    .toggle-row {
      display: flex; align-items: center;
      justify-content: space-between; padding: 2px 0;
    }
    .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--text-light); border-radius: 22px; transition: .25s;
    }
    .slider:before {
      position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
      background: white; border-radius: 50%; transition: .25s;
    }
    input:checked + .slider { background: var(--primary); }
    input:checked + .slider:before { transform: translateX(18px); }

    .segmented { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .segmented input { display: none; }
    .btn-seg {
      display: flex; align-items: center; justify-content: center;
      height: 38px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg-input); color: var(--text-muted);
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .segmented input:checked + .btn-seg {
      border-color: var(--primary); background: var(--primary-light); color: var(--primary);
    }

    .error-box {
      background: var(--error-bg); border: 1.5px solid var(--error-border);
      border-radius: var(--radius-sm); padding: 10px 12px; display: none;
    }
    .error-box.visible { display: block; }

    .btn-primary {
      width: 100%; height: 48px; background: var(--primary); color: white; border: none;
      border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer;
      box-shadow: 0 6px 16px -4px rgba(5,150,105,0.35);
    }
    .btn-ghost {
      width: 100%; height: 38px; background: transparent; border: none;
      color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer;
    }

    /* Success — pre-built in DOM, toggled via display */
    .success-view {
      display: none;
      text-align: center;
      padding: 48px 16px;
    }
    .success-view.active { display: block; }
    .success-icon {
      width: 64px; height: 64px; border-radius: 50%; background: var(--primary-light);
      color: var(--primary); font-size: 28px; margin: 0 auto 16px; display: grid; place-items: center;
    }

    @media (min-width: 480px) {
      body { padding: 24px 16px; }
      .page {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: 20px; box-shadow: 0 20px 60px -10px rgba(5,150,105,0.12);
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <!-- Header -->
    <header class="header" id="header-view">
      <div class="badge">⚽ Nueva pichanga</div>
      <h1 class="h1-brand">Organiza tu <span>partido</span></h1>
      <p class="subtitle">Completa los datos y Grubot hará el resto.</p>
    </header>

    <!-- Form -->
    <form class="form" id="pichanga-form">
      <div class="card">
        <div class="card-label">Evento</div>
        <div class="field">
          <label class="label">Nombre</label>
          <input type="text" id="p-title" class="ui-input" value="PICHANGUITA #07" />
        </div>
        <div class="field">
          <label class="label">Lugar</label>
          <input type="text" id="p-lugar" class="ui-input" placeholder="Cancha o dirección" autocomplete="off" />
        </div>
      </div>

      <div class="card">
        <div class="card-label">Horario &amp; Jugadores</div>
        <div class="grid-2">
          <div class="field">
            <label class="label">Fecha</label>
            <input type="date" id="p-date" class="ui-input" />
          </div>
          <div class="field">
            <label class="label">Jugadores</label>
            <input type="number" id="p-count" class="ui-input" value="10" />
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label class="label">Inicio</label>
            <input type="time" id="p-start" class="ui-input" value="19:00" />
          </div>
          <div class="field">
            <label class="label">Fin</label>
            <input type="time" id="p-end" class="ui-input" value="20:00" />
          </div>
        </div>
        <div class="toggle-row">
          <span class="label">Permitir suplentes</span>
          <label class="switch">
            <input type="checkbox" id="p-backups" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Pago</div>
        <div class="field">
          <label class="label">Cuota (S/)</label>
          <input type="text" id="p-quota" class="ui-input" value="0.00" inputmode="decimal" style="text-align: right; font-variant-numeric: tabular-nums;" />
        </div>
        <div class="segmented">
          <div>
            <input type="radio" name="pay-method" id="cb-yape" checked />
            <label class="btn-seg" for="cb-yape">Yape</label>
          </div>
          <div>
            <input type="radio" name="pay-method" id="cb-plin" />
            <label class="btn-seg" for="cb-plin">Plin</label>
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label class="label">Número</label>
            <input type="text" id="p-num" class="ui-input" placeholder="999888777" maxlength="9" inputmode="numeric" pattern="[0-9]*" />
          </div>
          <div class="field">
            <label class="label">Titular</label>
            <input type="text" id="p-nom" class="ui-input" placeholder="Nombre" />
          </div>
        </div>
      </div>

      <div class="error-box" id="error-box">
        <strong style="color:var(--error)">Error al publicar</strong>
        <code id="error-detail" style="display:block; font-size:11px; margin-top:4px;"></code>
      </div>

      <div class="actions" style="display:flex; flex-direction:column; gap:8px;">
        <button type="submit" class="btn-primary" id="btn-crear">Publicar lista</button>
        <button type="button" class="btn-ghost" id="btn-cancel">Cancelar</button>
      </div>
    </form>

    <!-- Success (pre-built in DOM, hidden until needed) -->
    <div class="success-view" id="success-view">
      <div class="success-icon">✓</div>
      <h2>¡Lista Lista!</h2>
      <p>Grubot enviará el mensaje al grupo en un momento.</p>
      <button class="btn-primary" style="margin-top:20px" onclick="window.close()">Cerrar</button>
    </div>
  </main>

  <script src="config.js"></script>
  <script>
    // 1. Google Places Autocomplete
    function initAutocomplete() {
      const input = document.getElementById('p-lugar');
      if (!input) return;

      const autocomplete = new google.maps.places.Autocomplete(input, {
        componentRestrictions: { country: 'pe' },
        fields: ['formatted_address', 'geometry', 'name'],
        types: ['establishment', 'geocode'],
      });

      const observer = new MutationObserver(() => {
        const pac = document.querySelector('.pac-container');
        if (pac && pac.parentElement !== document.body) {
          document.body.appendChild(pac);
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') e.preventDefault();
      });

      autocomplete.addListener('place_changed', () => {
        const place = autocomplete.getPlace();
        if (!place.geometry) return;
        const name = place.name || '';
        const addr = place.formatted_address || '';
        if (name && addr && !addr.startsWith(name)) {
          input.value = `${name}, ${addr}`;
        } else {
          input.value = addr || name;
        }
      });
    }

    // 2. Load Google Maps
    (function loadGoogle() {
      if (!window.ENV?.GOOGLE_MAPS_KEY) {
        console.error('Falta GOOGLE_MAPS_KEY en config.js');
        return;
      }
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${window.ENV.GOOGLE_MAPS_KEY}&libraries=places&callback=initAutocomplete`;
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    })();

    // 3. UI Logic
    const form = document.getElementById('pichanga-form');
    const createBtn = document.getElementById('btn-crear');
    const quotaInput = document.getElementById('p-quota');
    const dateInput = document.getElementById('p-date');
    const numInput = document.getElementById('p-num');

    // Default date: tomorrow
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    dateInput.value = tomorrow.toISOString().split('T')[0];
    dateInput.min = new Date().toISOString().split('T')[0];

    // ─── ATM-style quota input ───
    let quotaCents = 0;

    quotaInput.addEventListener('keydown', (e) => {
      const allowed = ['Backspace', 'Delete', 'Tab', 'Escape', 'Enter',
                        'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'];
      if (allowed.includes(e.key)) {
        if (e.key === 'Backspace') {
          e.preventDefault();
          quotaCents = Math.floor(quotaCents / 10);
          quotaInput.value = (quotaCents / 100).toFixed(2);
        }
        return;
      }
      if (!/^[0-9]$/.test(e.key)) { e.preventDefault(); return; }
      e.preventDefault();
      if (quotaCents >= 999999) return;
      quotaCents = quotaCents * 10 + parseInt(e.key, 10);
      quotaInput.value = (quotaCents / 100).toFixed(2);
    });

    quotaInput.addEventListener('focus', () => { quotaInput.select(); });

    quotaInput.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData).getData('text');
      const digits = pasted.replace(/\D/g, '');
      if (digits) {
        quotaCents = parseInt(digits, 10);
        if (quotaCents > 999999) quotaCents = 999999;
        quotaInput.value = (quotaCents / 100).toFixed(2);
      }
    });

    // ─── Número input — digits only ───
    numInput.addEventListener('keydown', (e) => {
      const allowed = ['Backspace', 'Delete', 'Tab', 'Escape', 'Enter',
                        'ArrowLeft', 'ArrowRight', 'Home', 'End'];
      if (allowed.includes(e.key) || e.ctrlKey || e.metaKey) return;
      if (!/^[0-9]$/.test(e.key)) { e.preventDefault(); }
    });

    numInput.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData).getData('text');
      numInput.value = pasted.replace(/\D/g, '').slice(0, 9);
    });

    // ─── Show success (toggle visibility, no DOM destruction) ───
    function showSuccess() {
      document.getElementById('header-view').style.display = 'none';
      document.getElementById('pichanga-form').style.display = 'none';
      document.getElementById('success-view').classList.add('active');
    }

    // ─── Submit ───
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('error-box');
      errorBox.style.display = 'none';

      const payload = {
        titulo:          document.getElementById('p-title').value.trim(),
        lugar:           document.getElementById('p-lugar').value.trim(),
        fecha_pichanga:  document.getElementById('p-date').value,
        hora_inicio:     document.getElementById('p-start').value,
        hora_fin:        document.getElementById('p-end').value,
        cuota:           parseFloat(document.getElementById('p-quota').value),
        metodo_pago:     document.getElementById('cb-yape').checked ? 'YAPE' : 'PLIN',
        numero_pago:     document.getElementById('p-num').value.trim(),
        titular_pago:    document.getElementById('p-nom').value.trim(),
        cantidad:        parseInt(document.getElementById('p-count').value, 10),
        permite_backups: document.getElementById('p-backups').checked
      };

      if (!payload.lugar || !payload.numero_pago) {
        errorBox.style.display = 'block';
        document.getElementById('error-detail').textContent = 'Falta lugar o número de pago.';
        return;
      }

      createBtn.disabled = true;
      createBtn.textContent = 'Publicando...';

      try {
        // 1. Save to Supabase
        const res = await fetch(`${window.ENV.SUPABASE_URL}/rest/v1/pichangas`, {
          method: 'POST',
          headers: {
            apikey: window.ENV.SUPABASE_KEY,
            Authorization: `Bearer ${window.ENV.SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            Prefer: 'return=representation'
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const body = await res.json().catch(() => null);
          throw new Error(body?.message || `Error Supabase: ${res.status}`);
        }

        const data = await res.json();
        const newPichanga = data[0];

        // 2. Notify n8n — await fully before changing UI
        const n8nData = {
          event: 'pichanga_created',
          match_id: newPichanga.id_pichanga_pub,
          pichanga: newPichanga
        };

        try {
          const n8nRes = await fetch(window.ENV.N8N_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(n8nData),
            keepalive: true
          });
          console.log('[Grubot] n8n response:', n8nRes.status);
        } catch (n8nErr) {
          console.warn('[Grubot] n8n failed, record saved:', n8nErr);
        }

        // 3. Show success — only AFTER n8n fetch resolves
        showSuccess();

      } catch (err) {
        createBtn.disabled = false;
        createBtn.textContent = 'Publicar lista';
        errorBox.style.display = 'block';
        document.getElementById('error-detail').textContent = err.message;
      }
    });

    document.getElementById('btn-cancel').onclick = () => window.close();
  </script>
</body>
</html>
