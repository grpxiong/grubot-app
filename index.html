<!DOCTYPE html>
<html>
<head>
  <title>Organizador de Pichangas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    #pichanga-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      box-sizing: border-box;
      padding: 16px;
    }

    #pichanga-form {
      background: white;
      padding: 24px;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      max-height: 90vh;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .p-label {
      font-size: 11px;
      font-weight: 700;
      color: #666;
      margin-bottom: 4px;
      display: block;
      text-transform: uppercase;
    }

    .p-input {
      width: 100%;
      padding: 10px 32px 10px 10px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
      outline: none;
      min-height: 44px;
    }

    .p-input:focus {
      border-color: #128C7E;
    }

    .input-wrapper {
      position: relative;
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #ccc;
      font-weight: bold;
      font-size: 14px;
      user-select: none;
      padding: 5px;
      line-height: 1;
    }

    .p-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .p-time-row {
      display: flex;
      gap: 8px;
    }

    .p-pay-section {
      background: #f7f9f9;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid #edf2f2;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .p-check-row {
      display: flex;
      gap: 20px;
    }

    .p-check-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .p-pay-inputs {
      display: flex;
      gap: 8px;
    }

    .p-pay-inputs .input-wrapper:first-child { flex: 1; }
    .p-pay-inputs .input-wrapper:last-child  { flex: 1.5; }

    .btn-gen {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #25D366;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin-top: 6px;
      min-height: 50px;
    }

    .btn-cancel {
      width: 100%;
      background: none;
      border: none;
      color: #999;
      font-size: 13px;
      cursor: pointer;
      padding: 6px;
    }

    /* Mobile: full-width comfortable layout */
    @media (max-width: 480px) {
      #pichanga-form {
        padding: 18px;
        border-radius: 16px;
        gap: 12px;
      }

      .p-input {
        font-size: 16px; /* prevents iOS zoom */
      }
    }
  </style>
</head>
<body>
  <script>
    (function() {

      const SUPABASE_URL = 'https://fzrpjbojyzzohcypgfzm.supabase.co';
      const SUPABASE_KEY = 'sb_publishable_6WvoLA-b4diZ4_omsc-XUg_5iNrppdz';

      // --- Overlay ---
      const overlay = document.createElement('div');
      overlay.id = 'pichanga-overlay';

      // --- Form container ---
      const form = document.createElement('div');
      form.id = 'pichanga-form';

      // --- Header ---
      const hTitle = document.createElement('h2');
      hTitle.textContent = '⚽ Nueva Pichanga ⚽';
      hTitle.style.cssText = 'margin:0; color:#128C7E; font-size:20px; font-weight:800; text-align:center;';
      form.appendChild(hTitle);

      // --- Helper: create field with optional clear button ---
      const createField = (labelTxt, id, value, type = 'text', min = '', hasClear = false) => {
        const div = document.createElement('div');

        const label = document.createElement('label');
        label.textContent = labelTxt;
        label.className = 'p-label';

        const wrapper = document.createElement('div');
        wrapper.className = 'input-wrapper';

        const input = document.createElement('input');
        input.type = type;
        input.id = id;
        input.value = value;
        input.className = 'p-input';
        if (min) input.min = min;

        wrapper.appendChild(input);

        if (hasClear) {
          const btn = document.createElement('span');
          btn.textContent = '✕';
          btn.className = 'clear-btn';
          btn.onclick = () => { input.value = ''; input.focus(); };
          wrapper.appendChild(btn);
        }

        div.append(label, wrapper);
        return { div, input };
      };

      // --- Title & Lugar ---
      form.appendChild(createField('Título', 'p-title', 'PICHANGUITA #07', 'text', '', true).div);
      form.appendChild(createField('Lugar', 'p-lugar', 'Estadio Municipal Julio Montjoy Guizado (Jr. Santo Cristo 584, Surco)', 'text', '', true).div);

      // --- Fecha ---
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const minStr = tomorrow.toISOString().split('T')[0];
      form.appendChild(createField('Fecha', 'p-date', minStr, 'date', minStr).div);

      // --- Hora ---
      const timeDiv = document.createElement('div');
      const timeLabel = document.createElement('label');
      timeLabel.textContent = 'Hora';
      timeLabel.className = 'p-label';

      const timeFlex = document.createElement('div');
      timeFlex.className = 'p-time-row';

      const startInput = document.createElement('input');
      startInput.type = 'time'; startInput.value = '00:00'; startInput.className = 'p-input';

      const endInput = document.createElement('input');
      endInput.type = 'time'; endInput.value = '01:00'; endInput.className = 'p-input';

      timeFlex.append(startInput, endInput);
      timeDiv.append(timeLabel, timeFlex);
      form.appendChild(timeDiv);

      // --- Cuota + N° Jugadores ---
      const rowRow = document.createElement('div');
      rowRow.className = 'p-two-col';

      const qField = createField('Cuota (S/)', 'p-quota', '00.00');
      const qIn = qField.input;
      qIn.style.textAlign = 'right';
      qIn.style.fontFamily = 'monospace';

      const lockCursor = (el) => setTimeout(() => { const l = el.value.length; el.setSelectionRange(l, l); }, 0);
      ['focus', 'click', 'keyup'].forEach(evt => qIn.addEventListener(evt, () => lockCursor(qIn)));
      qIn.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\D/g, '');
        e.target.value = (parseInt(val || 0) / 100).toFixed(2);
        lockCursor(e.target);
      });

      rowRow.appendChild(qField.div);
      rowRow.appendChild(createField('N° Jugadores', 'p-count', '10', 'number').div);
      form.appendChild(rowRow);

      // --- Payment section ---
      const paySection = document.createElement('div');
      paySection.className = 'p-pay-section';

      const payLabel = document.createElement('label');
      payLabel.textContent = 'Método de Pago';
      payLabel.className = 'p-label';
      paySection.appendChild(payLabel);

      const selectorRow = document.createElement('div');
      selectorRow.className = 'p-check-row';

      const createCheck = (name) => {
        const lbl = document.createElement('label');
        lbl.className = 'p-check-label';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        lbl.append(cb, name);
        return { lbl, cb };
      };

      const yape = createCheck('YAPE');
      const plin = createCheck('PLIN');
      selectorRow.append(yape.lbl, plin.lbl);
      paySection.appendChild(selectorRow);

      // Payment inputs
      const payInputs = document.createElement('div');
      payInputs.className = 'p-pay-inputs';

      const numWrapper = document.createElement('div');
      numWrapper.className = 'input-wrapper';
      const numIn = document.createElement('input');
      numIn.placeholder = 'Número';
      numIn.maxLength = 9;
      numIn.disabled = true;
      numIn.value = '';
      numIn.inputMode = 'numeric';
      numIn.pattern = '[0-9]*';
      numIn.className = 'p-input';
      // Numeric-only enforcement
      numIn.addEventListener('input', () => {
        numIn.value = numIn.value.replace(/\D/g, '');
      });
      numWrapper.appendChild(numIn);
      const numClear = document.createElement('span');
      numClear.textContent = '✕'; numClear.className = 'clear-btn';
      numClear.onclick = () => { numIn.value = ''; numIn.focus(); };
      numWrapper.appendChild(numClear);

      const nomWrapper = document.createElement('div');
      nomWrapper.className = 'input-wrapper';
      const nomIn = document.createElement('input');
      nomIn.placeholder = 'Titular';
      nomIn.disabled = true;
      nomIn.value = '';
      nomIn.className = 'p-input';
      nomWrapper.appendChild(nomIn);
      const nomClear = document.createElement('span');
      nomClear.textContent = '✕'; nomClear.className = 'clear-btn';
      nomClear.onclick = () => { nomIn.value = ''; nomIn.focus(); };
      nomWrapper.appendChild(nomClear);

      payInputs.append(numWrapper, nomWrapper);
      paySection.appendChild(payInputs);
      form.appendChild(paySection);

      // Checkbox exclusivity
      const handleCheck = (current, other) => {
        if (current.checked) {
          other.checked = false;
          numIn.disabled = false; nomIn.disabled = false;
        } else if (!other.checked) {
          numIn.disabled = true; nomIn.disabled = true;
        }
      };
      yape.cb.onchange = () => handleCheck(yape.cb, plin.cb);
      plin.cb.onchange = () => handleCheck(plin.cb, yape.cb);

      // --- Buttons ---
      const btnGen = document.createElement('button');
      btnGen.textContent = 'Crear Lista';
      btnGen.className = 'btn-gen';

      const btnCancel = document.createElement('button');
      btnCancel.textContent = 'Cancelar';
      btnCancel.className = 'btn-cancel';

      form.append(btnGen, btnCancel);
      overlay.appendChild(form);
      document.body.appendChild(overlay);

      const clean = () => overlay.remove();
      btnCancel.onclick = clean;

      btnGen.onclick = () => {
        const title   = document.getElementById('p-title').value;
        const lugar   = document.getElementById('p-lugar').value;
        const dateVal = document.getElementById('p-date').value;
        const quota   = document.getElementById('p-quota').value;
        const count   = parseInt(document.getElementById('p-count').value);

        if (!dateVal) return alert('Selecciona una fecha');

        const dateObj = new Date(dateVal + 'T12:00:00');
        let fDate = dateObj.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
        const capDate = fDate.split(' ').map(word => word.length <= 2 ? word : word.charAt(0).toUpperCase() + word.slice(1)).join(' ');

        const saveToDb = async () => {
          await fetch(`${SUPABASE_URL}/rest/v1/pichangas`, {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ title, lugar, fecha: capDate, quota })
          });
        };
        saveToDb();

        const toAmPm = (t) => {
          let [h, m] = t.split(':');
          h = parseInt(h);
          return `${h % 12 || 12}:${m} ${h >= 12 ? 'PM' : 'AM'}`;
        };

        let method = yape.cb.checked ? 'YAPE' : (plin.cb.checked ? 'PLIN' : '');
        let payLine = method ? `\`\`\`${method} al ${numIn.value} (${nomIn.value})\`\`\`` : '```Pago por definir```';

        let slots = '';
        for (let i = 1; i <= count; i++) {
          slots += `\`${i < 10 ? '0' + i : i}\` \n`;
        }

        const msg = `*\`[ ${title.toUpperCase()} ]\`*
*Fecha:*   \`${capDate}\`
              *\`${toAmPm(startInput.value)} - ${toAmPm(endInput.value)}\`*

*Lugar:*   *\`${lugar}\`*

*Cuota:*   *\`S/ ${quota}\`*
${payLine}

${slots}`;

        navigator.clipboard.writeText(msg).then(() => {
          alert('¡Copiado!');
          clean();
        });
      };

    })();
  </script>
</body>
</html>
