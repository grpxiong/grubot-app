<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil de Jugador | Grubot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#059669">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary:       #059669;
      --primary-hover: #047857;
      --primary-light: rgba(5, 150, 105, 0.09);
      --primary-glow:  rgba(5, 150, 105, 0.22);
      --bg:            #f0fdf4;
      --surface:       #ffffff;
      --muted:         #f8fafc;
      --border:        #d1fae5;
      --text:          #1e293b;
      --text-2:        #64748b;
      --text-3:        #94a3b8;
      --shadow:        0 20px 60px -10px rgba(5,150,105,0.15), 0 4px 16px rgba(0,0,0,0.06);
      --sat: env(safe-area-inset-top,    0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      min-height: 100dvh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(5,150,105,0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(4,120,87,0.07) 0%, transparent 55%);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--sat) + 20px) 16px calc(var(--sab) + 20px);
    }

    /* ── CARD ─────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border-radius: 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: cardIn .5s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HERO BANNER ──────────────────────────── */
    .hero {
      position: relative;
      background: linear-gradient(135deg, #059669 0%, #047857 60%, #065f46 100%);
      padding: 36px 24px 44px; /* Ajustado para mejor proporción */
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center; /* Todo centrado */
      text-align: center;
    }

    /* decorative pitch lines */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.04) 0px,
          rgba(255,255,255,0.04) 1px,
          transparent 1px,
          transparent 48px
        );
    }

    /* football texture circle */
    .hero::after {
      content: '⚽';
      position: absolute;
      right: -18px;
      top: -18px;
      font-size: 110px;
      opacity: .07;
      line-height: 1;
      pointer-events: none;
    }

    /* ── AVATAR ───────────────────────────────── */
    .avatar-wrap {
      position: relative;
      width: fit-content;
      animation: fadeUp .5s .1s cubic-bezier(.16,1,.3,1) both;
    }

    .avatar {
      width: 56px; /* Más pequeño y elegante */
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: 2.5px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 22px; /* Reducido en proporción */
      color: white;
      letter-spacing: -.02em;
      backdrop-filter: blur(8px);
      user-select: none;
    }

    .status-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      background: #4ade80;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 0 2px rgba(74,222,128,.4);
    }

    .hero-name {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      color: white;
      line-height: 1.15;
      letter-spacing: -.02em;
      margin-top: 12px;
      animation: fadeUp .5s .15s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RATING CHIP (hero) ───────────────────── */
    .rating-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 13px;
      font-weight: 700;
      color: white;
      backdrop-filter: blur(4px);
      letter-spacing: .01em;
      margin-top: 10px; /* Separación del nombre */
      animation: fadeUp .5s .2s cubic-bezier(.16,1,.3,1) both;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05); /* Sombra sutil para darle profundidad */
    }

    .rating-chip .star-icon { font-size: 13px; }

    /* ── STATS ROW ────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative;
      top: -1px;
      animation: fadeUp .5s .25s cubic-bezier(.16,1,.3,1) both;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 8px;
      gap: 3px;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }

    .stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      color: var(--text);
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-3);
      text-align: center;
    }

    /* ── BODY ─────────────────────────────────── */
    .body {
      padding: 22px 24px 26px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: fadeUp .5s .3s cubic-bezier(.16,1,.3,1) both;
    }

    /* ── INFO ROWS ────────────────────────────── */
    .info-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-3);
      margin-bottom: 2px;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--muted);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .info-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .info-content { min-width: 0; }

    .info-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-3);
      line-height: 1;
      margin-bottom: 3px;
    }

    .info-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── DIVIDER ──────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
    }

    /* ── ACTIONS ──────────────────────────────── */
    .actions { display: flex; gap: 10px; }

    .btn-primary {
      flex: 1;
      min-height: 50px;
      border: none;
      border-radius: 14px;
      background: var(--primary);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s;
      box-shadow: 0 4px 14px rgba(5,150,105,.28);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-primary:active { background: var(--primary-hover); transform: scale(.97); }

    .btn-ghost {
      min-height: 50px;
      padding: 0 18px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      background: transparent;
      color: var(--text-2);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-ghost:active { border-color: var(--primary); color: var(--primary); }

  </style>
</head>

<body>
  <div class="card" id="card">

    <div class="hero">
      <div class="avatar-wrap">
        <div class="avatar" id="avatar">CR</div>
        <div class="status-dot"></div>
      </div>
      <div class="hero-name" id="hero-name">Carlos Ramírez</div>
      <span class="rating-chip" id="rating-chip">
        <span class="star-icon">⭐</span>
        <span id="rating-value">4.7</span>
      </span>
    </div>

    <div class="stats-row">
      <div class="stat">
        <span class="stat-value" id="stat-pichangas">12</span>
        <span class="stat-label">Pichangas</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-titular">9</span>
        <span class="stat-label">Titular</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-suplente">3</span>
        <span class="stat-label">Suplente</span>
      </div>
    </div>

    <div class="body">

      <div class="info-block">
        <span class="section-label">Información</span>

        <div class="info-row">
          <div class="info-icon">🎂</div>
          <div class="info-content">
            <div class="info-title">Fecha de nacimiento</div>
            <div class="info-value" id="info-dob">14 de agosto, 1995</div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-icon">📅</div>
          <div class="info-content">
            <div class="info-title">Miembro desde</div>
            <div class="info-value" id="info-since">Marzo 2025</div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-icon">📍</div>
          <div class="info-content">
            <div class="info-title">Número WhatsApp</div>
            <div class="info-value" id="info-phone">+51 987 654 321</div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-icon">🥅</div>
          <div class="info-content">
            <div class="info-title">Posición preferida</div>
            <div class="info-value" id="info-posicion">Delantero</div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="actions">
        <button class="btn-primary" onclick="window.location.href='editar-perfil.html?num=' + phone">Editar perfil</button>
        <button class="btn-ghost" onclick="alert('Compartir')">Compartir</button>
      </div>

    </div>
  </div>

  <script src="config.js" onerror="window.ENV={}"></script>
  <script>
    // ── Read URL params ──
    const params  = new URLSearchParams(window.location.search);
    const phone   = params.get('num') || params.get('numero') || null;

    const SUPABASE_URL = window.ENV?.SUPABASE_URL;
    const SUPABASE_KEY = window.ENV?.SUPABASE_KEY;

    // ── Helpers ──
    function initials(name) {
      return name.trim().split(/\s+/).slice(0, 2).map(w => w[0].toUpperCase()).join('');
    }

    function formatPhone(raw) {
      const d = raw.replace(/\D/g, '');
      if (d.length === 11) return `+${d.slice(0,2)} ${d.slice(2,5)} ${d.slice(5,8)} ${d.slice(8)}`;
      if (d.length === 12) return `+${d.slice(0,3)} ${d.slice(3,6)} ${d.slice(6,9)} ${d.slice(9)}`;
      return raw;
    }

    function formatDate(iso) {
      const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
      const [y, m, d] = iso.split('-').map(Number);
      return `${d} de ${meses[m-1]}, ${y}`;
    }

    function formatSince(iso) {
      const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
      const d = new Date(iso);
      return `${meses[d.getMonth()]} ${d.getFullYear()}`;
    }

    // ── Render persona ──
    function render(persona) {
      document.getElementById('avatar').textContent     = initials(persona.nombre);
      document.getElementById('hero-name').textContent  = persona.nombre;
      // Removida la actualización del hero-phone porque el elemento ya no existe en HTML
      document.getElementById('info-phone').textContent = formatPhone(persona.numero || '');
      document.getElementById('info-dob').textContent   = persona.fecha_nac ? formatDate(persona.fecha_nac) : '—';
      document.getElementById('info-since').textContent = persona.created_at ? formatSince(persona.created_at) : '—';
      if (persona.posicion)  document.getElementById('info-posicion').textContent = persona.posicion;
      if (persona.rating)    document.getElementById('rating-value').textContent  = Number(persona.rating).toFixed(1);
    }

    // ── Fetch from Supabase if env is available ──
    async function load() {
      if (!SUPABASE_URL || !SUPABASE_KEY || !phone) return;

      const cleanPhone = phone.startsWith('+') ? phone : `+${phone.replace(/\D/g,'')}`;
      const url = `${SUPABASE_URL}/rest/v1/personas?numero=eq.${encodeURIComponent(cleanPhone)}&limit=1`;

      try {
        const res = await fetch(url, {
          headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
        });
        const rows = await res.json();
        if (rows.length) render(rows[0]);
      } catch (e) {
        console.warn('Could not load profile:', e.message);
      }
    }

    load();
  </script>
</body>
</html>
